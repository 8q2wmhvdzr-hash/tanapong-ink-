<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Smart Ink Pro - Tanapong</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: 'Kanit', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f1f5f9; }
    .sidebar-active { background: rgba(255,255,255,0.15); border-left: 4px solid #fff; opacity: 1 !important; }
    .modal-show { opacity: 1 !important; pointer-events: auto !important; visibility: visible !important; }
    .sidebar-mobile-hide { transform: translateX(-100%); }
    .sidebar-mobile-show { transform: translateX(0); }
    #top-loading-bar { position: fixed; top: 0; left: 0; height: 3px; background: linear-gradient(to right, #0ea5e9, #001b6e); z-index: 10000; width: 0%; opacity: 0; transition: width 0.3s ease, opacity 0.3s ease; }
    #login-view, #main-view { display: none; min-height: 100vh; width: 100%; }
    #login-view.active { display: flex; background-color: #001b6e; }
    #main-view.active { display: flex; background-color: #f1f5f9; }
    @media (max-width: 767px) { #main-view.active { display: block; } }
    input[type="date"]::-webkit-calendar-picker-indicator { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10; }
  </style>
</head>
<body class="min-h-screen text-slate-800 overflow-x-hidden">

  <div id="top-loading-bar"></div>

  <div id="login-view" class="fixed inset-0 flex flex-col items-center justify-center p-4 z-[2000]">
    <div class="mb-6 text-center text-white">
      <div class="bg-white p-2 rounded-3xl shadow-xl mb-4 inline-flex items-center justify-center w-24 h-24 mx-auto"><img src="logo.png" alt="Logo" class="max-w-full max-h-full object-contain"></div>
      <h1 class="text-3xl font-bold tracking-tight uppercase italic">Ink Stock Pro</h1>
      <p class="text-sm opacity-70 mt-1 uppercase tracking-widest font-medium">Tanapong Logistic System</p>
    </div>
    <div class="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl p-8 relative border border-slate-100">
      <div id="login-error" class="hidden mb-4 p-4 bg-red-50 text-red-600 rounded-2xl text-xs font-bold border border-red-100 flex items-center gap-2"><i data-lucide="alert-triangle" class="w-4 h-4"></i><span id="login-error-text">ข้อผิดพลาด</span></div>
      <div class="space-y-4">
        <div><label class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-1.5 pl-1">ชื่อผู้ใช้งาน</label><input type="text" id="login-user" onkeypress="if(event.key==='Enter') document.getElementById('login-btn-action').click()" placeholder="Username" class="w-full px-5 py-3.5 rounded-2xl bg-slate-50 border-2 border-slate-100 outline-none focus:border-blue-500 text-sm font-bold transition-all"></div>
        <div><label class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-1.5 pl-1">รหัสผ่าน</label><input type="password" id="login-pass" onkeypress="if(event.key==='Enter') document.getElementById('login-btn-action').click()" placeholder="••••••••" class="w-full px-5 py-3.5 rounded-2xl bg-slate-50 border-2 border-slate-100 outline-none focus:border-blue-500 text-sm font-bold transition-all"></div>
        <button id="login-btn-action" onclick="handleLogin()" class="w-full bg-[#102a96] text-white py-4 rounded-2xl font-bold hover:bg-blue-800 shadow-xl transition-all active:scale-95">เข้าสู่ระบบ</button>
      </div>
    </div>
  </div>

  <div id="main-view" class="w-full min-h-screen md:flex-row relative">
    <header class="md:hidden bg-[#001b6e] text-white p-4 flex justify-between items-center sticky top-0 z-[1001] shadow-lg">
      <div class="flex items-center gap-3 font-bold"><img src="logo.png" alt="Logo" class="w-8 h-8 object-contain bg-white rounded p-1"><span class="text-sm uppercase">Ink System</span></div>
      <button onclick="toggleSidebarMobile(true)" class="p-2 bg-white/10 rounded-xl font-bold"><i data-lucide="menu"></i></button>
    </header>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-[#001b6e] text-white flex flex-col shadow-2xl z-[1002] transition-transform duration-300 sidebar-mobile-hide md:translate-x-0 md:sticky md:top-0 md:h-screen shrink-0 overflow-hidden">
      <div class="p-6 border-b border-white/10 text-center hidden md:block"><img src="logo.png" alt="Logo" class="h-16 mx-auto mb-3 object-contain bg-white rounded-xl p-2"><h1 class="text-2xl font-bold tracking-tighter uppercase italic">Ink System</h1></div>
      <nav class="flex-1 p-4 space-y-1 overflow-y-auto font-bold custom-scrollbar">
        <button onclick="changeView('all'); toggleSidebarMobile(false)" id="nav-all" class="nav-btn w-full flex items-center gap-3 p-4 rounded-xl hover:bg-white/5 transition sidebar-active"><i data-lucide="layout-grid"></i> หน้ารวมทั้งหมด</button>
        <button onclick="changeView('summary'); toggleSidebarMobile(false)" id="nav-summary" class="nav-btn w-full flex items-center gap-3 p-4 rounded-xl hover:bg-white/5 transition opacity-60"><i data-lucide="bar-chart-3"></i> สรุปและรายงาน</button>
        <button onclick="changeView('users'); toggleSidebarMobile(false)" id="nav-users" class="nav-btn w-full flex items-center gap-3 p-4 rounded-xl hover:bg-white/5 transition opacity-60 hidden text-orange-300"><i data-lucide="users"></i> จัดการผู้ใช้งาน</button>
        
        <div class="pt-6 pb-2 px-4 text-[12px] font-bold text-blue-300 uppercase tracking-widest border-t border-white/5 mt-4">Machine Groups</div>
        <div id="machine-menu" class="space-y-1">
            </div>
      </nav>
      <div class="p-4 border-t border-white/10"><button onclick="handleLogout()" class="w-full flex items-center justify-center gap-2 p-3 rounded-xl bg-red-600/20 hover:bg-red-600 transition text-sm font-bold"><i data-lucide="log-out" class="w-4 h-4"></i> ออกจากระบบ</button></div>
    </aside>

    <div id="sidebar-overlay" onclick="toggleSidebarMobile(false)" class="fixed inset-0 bg-black/50 z-[1000] hidden md:hidden"></div>

    <div class="flex-1 flex flex-col min-w-0">
      <header class="bg-white p-4 md:p-6 shadow-sm flex justify-between items-center sticky top-0 z-50">
        <h2 id="page-title" class="text-lg md:text-xl font-bold uppercase truncate">All Items</h2>
        <div class="flex items-center gap-3 relative ml-auto font-bold">
          <div id="status-dot" class="w-3 h-3 rounded-full bg-slate-300"></div>
          <input type="text" id="search" onkeyup="filter()" placeholder="ค้นหา..." class="px-4 py-2 rounded-full bg-slate-100 text-xs md:text-sm outline-none w-32 md:w-64 focus:ring-2 focus:ring-blue-500 transition-all font-bold">
          <div class="static md:relative inline-block">
            <button id="bell-btn" onclick="toggleNotification()" class="relative p-2.5 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-full outline-none"><i data-lucide="bell" class="w-5 h-5"></i><span id="bell-badge" class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full hidden"></span></button>
            <div id="notification-panel" class="fixed md:absolute top-16 md:top-auto right-4 left-4 md:right-0 md:left-auto md:mt-3 md:w-96 bg-white rounded-[2rem] shadow-2xl border border-slate-100 p-5 hidden z-[100] max-h-[70vh] overflow-y-auto">
              <h4 class="font-bold text-sm text-slate-800 mb-3 border-b pb-2">ประวัติการดำเนินการ</h4>
              <div id="notification-list" class="space-y-3 text-xs"></div>
            </div>
          </div>
        </div>
      </header>

      <div class="p-4 md:p-8 flex-1 min-w-0">
        <div id="inventory-view" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 font-bold"></div>
        <div id="summary-view" class="hidden space-y-6"></div> <div id="users-view" class="hidden space-y-6 font-bold">
          <div class="bg-white p-6 md:p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
            <div class="mb-6 flex justify-between items-center border-b pb-4">
              <h3 class="text-lg font-bold text-slate-800">จัดการผู้ใช้งานระบบ</h3>
              <button onclick="openAdminUserActionModal(null)" class="bg-[#102a96] text-white px-5 py-2.5 rounded-xl text-xs font-bold hover:bg-blue-800 shadow-md flex items-center gap-2"><i data-lucide="user-plus" class="w-4 h-4"></i> เพิ่มพนักงานใหม่</button>
            </div>
            <div id="user-management-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center opacity-0 pointer-events-none transition-all z-[1500] p-4 text-center">
    <div class="bg-white w-full max-w-sm rounded-[3.5rem] shadow-2xl p-8 scale-95 transition-transform duration-300">
      <div id="modal-img-container" class="w-20 h-20 rounded-2xl mx-auto mb-4 border border-slate-50 shadow-inner flex items-center justify-center overflow-hidden bg-slate-50"></div>
      <h3 id="modal-title" class="text-2xl font-bold mb-1 text-slate-800"></h3>
      <p id="modal-sub" class="text-[10px] text-slate-400 mb-6 uppercase break-all font-bold tracking-widest"></p>
      
      <div id="modal-machine-select" class="mb-4 text-left hidden">
        <label class="block text-[10px] font-extrabold text-slate-400 uppercase mb-1.5 pl-1">โปรดระบุเครื่องที่เบิก</label>
        <select id="modal-machine-dropdown" class="w-full px-5 py-3 rounded-2xl bg-slate-50 border-2 border-slate-100 outline-none text-sm font-bold text-slate-700"></select>
      </div>

      <div class="mb-4 text-left">
        <label class="block text-[10px] font-extrabold text-slate-400 uppercase mb-1.5 pl-1">ระบุจำนวนสินค้า</label>
        <input type="number" id="modal-qty" min="1" onkeypress="if(event.key==='-'||event.key==='e') return false; if(event.key==='Enter') document.getElementById('modal-submit').click()" class="w-full text-center text-4xl font-bold p-5 bg-slate-50 rounded-3xl border-2 border-slate-100 outline-none focus:border-blue-500 transition-all">
      </div>
      <div id="modal-remark-container" class="mb-8 text-left"><label class="block text-[10px] font-extrabold text-slate-400 uppercase mb-1.5 pl-1">หมายเหตุ</label><input type="text" id="modal-remark" onkeypress="if(event.key==='Enter') document.getElementById('modal-submit').click()" placeholder="..." class="w-full px-5 py-3 rounded-2xl bg-slate-50 border-2 border-slate-100 outline-none text-sm font-bold"></div>
      <div class="flex gap-4 font-bold">
        <button onclick="closeModal()" class="flex-1 py-4 bg-slate-100 text-slate-500 rounded-2xl hover:bg-slate-200 transition">ยกเลิก</button>
        <button id="modal-submit" class="flex-1 py-4 bg-[#102a96] text-white rounded-2xl shadow-xl">ตกลง</button>
      </div>
    </div>
  </div>

  <div id="admin-stock-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex flex-col items-center justify-center opacity-0 pointer-events-none transition-all z-[1800] p-4 text-center overflow-y-auto">
    <div class="bg-white w-full max-w-sm rounded-[3rem] shadow-2xl p-10 scale-95 transition-transform duration-300 my-8">
      <h3 class="text-2xl font-bold mb-2 text-slate-800">แก้ไขข้อมูลสต็อก</h3>
      <p id="admin-stock-sub" class="text-[10px] text-slate-400 mb-6 uppercase break-all font-bold"></p>
      
      <div class="mb-6 text-left border-b border-slate-100 pb-6">
        <label class="block text-[10px] font-extrabold text-slate-400 uppercase mb-1.5">ยอดคงเหลือใหม่</label>
        <div class="flex gap-2">
            <input type="number" id="admin-stock-qty" min="0" onkeypress="if(event.key==='-'||event.key==='e') return false; if(event.key==='Enter') document.getElementById('admin-stock-submit').click()" class="flex-1 text-center text-3xl font-bold p-4 bg-slate-50 rounded-3xl border-2 border-slate-100 outline-none focus:border-blue-500 transition-all">
            <button id="admin-stock-submit" class="px-6 bg-[#102a96] text-white font-bold rounded-3xl shadow-md">บันทึก</button>
        </div>
      </div>

      <div class="mb-6 text-left">
        <label class="block text-[10px] font-extrabold text-slate-400 uppercase mb-1.5">อัปโหลดรูปภาพสินค้า (Admin)</label>
        <input type="file" id="admin-image-file" accept="image/*" class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 mb-3">
        <button id="btn-upload-img" onclick="uploadAdminImage()" class="w-full py-3 bg-slate-800 text-white font-bold rounded-2xl shadow-md flex items-center justify-center gap-2 text-sm"><i data-lucide="image" class="w-4 h-4"></i> อัปโหลดรูป</button>
      </div>

      <button onclick="closeAdminStockModal()" class="w-full py-4 bg-slate-100 text-slate-500 font-bold rounded-2xl">ปิดหน้าต่าง</button>
    </div>
  </div>

  <div id="toast-container" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[3000] flex flex-col gap-3 pointer-events-none w-full max-w-sm px-4"></div>

  <script>
    // ---------------------------------------------------------------------
    // นำ URL ของ Web App ใหม่ที่ได้จาก GAS มาวางแทนที่บรรทัดด้านล่างนี้
    const API_URL = "https://script.google.com/macros/s/AKfycbwYOUR_API_KEY/exec"; 
    // ---------------------------------------------------------------------

    let inventory = [], usersDB = [], currentMachine = 'all', currentModalTask = null, currentAdminStockTask = null;
    const MACHINE_LIST = ["Cylinder 1", "Cylinder 2", "Cylinder 3", "Cylinder 4", "Mini Cylinder Suntech", "Mini Cylinder Tycan", "Flatbase 6090", "Flatbase BL (Tucan)", "UV DTF", "DTF China", "DTF Epson", "DTG", "Mini DTG", "Other"];

    function updateLoadingBar(percent, show = true) {
      const bar = document.getElementById('top-loading-bar');
      if (!bar) return; bar.style.width = percent + '%'; bar.style.opacity = show ? '1' : '0';
      if (percent >= 100) setTimeout(() => { bar.style.opacity = '0'; setTimeout(() => { bar.style.width = '0%'; }, 300); }, 500);
    }

    function filter() {
      const term = document.getElementById('search').value.toLowerCase();
      document.querySelectorAll('#inventory-view .card').forEach(card => {
        card.style.display = card.innerText.toLowerCase().includes(term) ? 'flex' : 'none';
      });
    }

    function renderMachineMenu() {
        const menuHTML = MACHINE_LIST.map(m => `
            <button onclick="changeView('machine', '${m}'); toggleSidebarMobile(false)" id="nav-${m.replace(/\s/g, '')}" class="nav-btn w-full flex items-center gap-3 p-3 pl-4 rounded-xl hover:bg-white/5 transition opacity-75 text-xs text-left font-bold">
                <i data-lucide="${m.toLowerCase().includes('cylinder')?'layers':'monitor'}"></i><span class="truncate font-bold">${m}</span>
            </button>
        `).join('');
        document.getElementById('machine-menu').innerHTML = menuHTML;
        lucide.createIcons();
    }

    function renderCards(mFilter = null) {
      const grid = document.getElementById('inventory-view');
      const isAdmin = localStorage.getItem('ink_user_role') === 'admin';
      
      const data = (mFilter && mFilter !== 'all') ? inventory.filter(i => i.machine.toLowerCase().includes(mFilter.toLowerCase())) : inventory;
      
      grid.innerHTML = data.map(item => {
        const imgDisplay = item.img ? `<img src="${item.img}" class="w-10 h-10 rounded-xl object-cover border shrink-0 shadow-inner">` : `<div class="w-10 h-10 rounded-xl border shrink-0 shadow-inner" style="background-color:${item.hex}"></div>`;
        return `
        <div class="card bg-white p-5 rounded-[2.5rem] shadow-sm border border-slate-100 relative flex flex-col justify-between min-h-[240px] z-0">
          ${item.qty <= item.minStock ? '<div class="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[9px] font-bold px-2.5 py-1 rounded-full animate-bounce shadow-md z-10">🚨 LOW STOCK</div>' : ''}
          <div class="w-full">
            <div class="flex justify-between items-start mb-4">
              <div class="flex items-center gap-2">${imgDisplay}
              ${isAdmin ? `<button onclick="openAdminStockModal('${item.id}', ${item.qty})" class="p-1.5 bg-slate-50 text-slate-400 rounded-lg hover:text-blue-900 transition-all shadow-sm"><i data-lucide="edit-3" class="w-3 h-3"></i></button>` : ''}</div>
              <span class="text-[9px] font-extrabold px-2 py-1 bg-slate-100 text-slate-500 rounded-lg uppercase truncate max-w-[120px] text-right">${item.machine.substring(0,25)}${item.machine.length>25?'...':''}</span>
            </div>
            <h3 class="font-extrabold text-slate-800 text-lg leading-tight mb-1 truncate">${item.type}</h3><p class="text-[11px] text-slate-400 break-all mb-4 uppercase font-medium tracking-tight font-bold">${item.id}</p>
          </div>
          <div class="w-full"><div class="flex justify-between mb-2 text-xs font-semibold"><span>คงเหลือ</span><span>${item.qty}</span></div>
            <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden mb-5"><div class="h-full transition-all duration-1000" style="width:${Math.min((item.qty/25)*100, 100)}%; background-color:${item.hex}"></div></div>
            <div class="grid grid-cols-2 gap-2.5">
              <button onclick="openModal('${item.id}', 'IN', ${item.qty})" class="py-2.5 bg-green-600 text-white rounded-xl text-xs font-bold active:scale-95 transition-all">รับเข้า</button>
              <button onclick="openModal('${item.id}', 'OUT', ${item.qty})" class="py-2.5 bg-red-600 text-white rounded-xl text-xs font-bold active:scale-95 transition-all">เบิกออก</button>
            </div>
          </div>
        </div>`
      }).join('');
      lucide.createIcons();
    }

    function changeView(v, p=null) { 
      currentMachine = p || 'all';
      document.querySelectorAll('.nav-btn').forEach(b => { b.classList.remove('sidebar-active'); b.classList.add('opacity-75'); }); 
      document.getElementById('inventory-view').classList.remove('hidden'); 
      document.getElementById('summary-view').classList.add('hidden'); 
      document.getElementById('users-view').classList.add('hidden'); 

      if (v==='all') { 
        document.getElementById('nav-all').classList.add('sidebar-active'); 
        document.getElementById('nav-all').classList.remove('opacity-75');
        renderCards(); document.getElementById('page-title').innerText="All Items"; 
      } else { 
        const navObj = document.getElementById(`nav-${p.replace(/\s/g,'')}`); 
        if(navObj) { navObj.classList.add('sidebar-active'); navObj.classList.remove('opacity-75'); }
        renderCards(p); document.getElementById('page-title').innerText=p; 
      } 
    }

    function openModal(id, type, qty) {
      const item = inventory.find(i => i.id === id);
      currentModalTask = { id, type, oldQty: qty, machines: item.machine.split(',').map(s=>s.trim()) };
      document.getElementById('modal').classList.add('modal-show');
      document.getElementById('modal-title').innerText = type === 'IN' ? 'รับเข้าสินค้า' : 'เบิกออกสินค้า';
      document.getElementById('modal-sub').innerText = id;
      
      const imgCont = document.getElementById('modal-img-container');
      imgCont.innerHTML = item.img ? `<img src="${item.img}" class="w-full h-full object-cover">` : `<div class="w-full h-full" style="background-color:${item.hex}"></div>`;
      
      document.getElementById('modal-qty').value = '';
      document.getElementById('modal-remark').value = '';
      
      const mcSelect = document.getElementById('modal-machine-select');
      const mcDropdown = document.getElementById('modal-machine-dropdown');
      
      // ถ้าอยู่หน้า All Items และสินค้านี้ใช้หลายเครื่อง ให้บังคับเลือกเครื่อง
      if (currentMachine === 'all' && currentModalTask.machines.length > 1) {
          mcSelect.classList.remove('hidden');
          mcDropdown.innerHTML = currentModalTask.machines.map(m => `<option value="${m}">${m}</option>`).join('');
      } else {
          mcSelect.classList.add('hidden');
      }
    }

    document.getElementById('modal-submit').onclick = async () => {
      const amt = parseFloat(document.getElementById('modal-qty').value);
      if (isNaN(amt) || amt <= 0) { showToast("ระบุจำนวนไม่ถูกต้อง", "error"); return; }
      
      const { id, type, oldQty, machines } = currentModalTask;
      if (type === 'OUT' && amt > oldQty) { showToast("ยอดคงเหลือไม่พอเบิก!", "error"); return; }
      
      let machineContext = currentMachine;
      if (currentMachine === 'all') {
          if (machines.length > 1) machineContext = document.getElementById('modal-machine-dropdown').value;
          else machineContext = machines[0];
      }

      const remark = document.getElementById('modal-remark').value.trim() || "-";
      closeModal();
      document.getElementById('status-dot').className = "w-3 h-3 rounded-full bg-orange-500 animate-spin";
      
      const idx = inventory.findIndex(i => i.id === id);
      if (idx !== -1) { inventory[idx].qty = type === 'IN' ? inventory[idx].qty + amt : inventory[idx].qty - amt; renderCards(currentMachine); }
      
      try {
        const payload = { action: 'update', id: id, amt: amt, type: type, remark: remark, user: localStorage.getItem('ink_current_user'), machine: machineContext };
        const resp = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        document.getElementById('status-dot').className = "w-3 h-3 rounded-full bg-green-500";
        showToast(`บันทึก${type==='IN'?'รับเข้า':'เบิกออก'}สำเร็จ`, 'success');
        init(); 
      } catch (e) { showToast("เกิดข้อผิดพลาดในการเชื่อมต่อ", "error"); document.getElementById('status-dot').className = "w-3 h-3 rounded-full bg-red-500"; }
    };

    function openAdminStockModal(id, qty) { 
      currentAdminStockTask={id,qty}; 
      const item = inventory.find(i=>i.id===id);
      document.getElementById('admin-stock-modal').classList.add('modal-show'); 
      document.getElementById('admin-stock-sub').innerText = id; 
      document.getElementById('admin-stock-qty').value = qty; 
      document.getElementById('admin-image-file').value = "";
    }
    function closeAdminStockModal() { document.getElementById('admin-stock-modal').classList.remove('modal-show'); }
    
    document.getElementById('admin-stock-submit').onclick = async () => {
      const tQty = parseFloat(document.getElementById('admin-stock-qty').value); if(isNaN(tQty)||tQty<0) return;
      const {id,qty} = currentAdminStockTask; if(tQty===qty){ closeAdminStockModal(); return; }
      closeAdminStockModal(); document.getElementById('status-dot').className="w-3 h-3 rounded-full bg-orange-500 animate-spin";
      
      try { 
        const payload = { action: 'update', id: id, amt: tQty, type: 'EDIT', remark: 'Admin Edit', user: localStorage.getItem('ink_current_user'), machine: 'Admin Dashboard' };
        await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        document.getElementById('status-dot').className="w-3 h-3 rounded-full bg-green-500"; 
        showToast(`แก้ไขยอดเป็น ${tQty} ชิ้น สำเร็จ`, 'success');
        init(); 
      } catch(e){ showToast("เกิดข้อผิดพลาด", "error"); }
    };

    async function uploadAdminImage() {
        const fileInput = document.getElementById('admin-image-file');
        const file = fileInput.files[0];
        if (!file) return showToast("กรุณาเลือกไฟล์รูปภาพก่อน", "error");

        const btn = document.getElementById('btn-upload-img');
        btn.innerHTML = `<i data-lucide="loader" class="w-4 h-4 animate-spin"></i> กำลังอัปโหลด...`;
        btn.disabled = true; lucide.createIcons();

        const reader = new FileReader();
        reader.onload = async function() {
            try {
                const payload = { action: 'uploadImage', id: currentAdminStockTask.id, base64: reader.result, mimeType: file.type };
                const resp = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                const res = await resp.json();
                if(res.success) { showToast("อัปโหลดรูปภาพสำเร็จ!", "success"); closeAdminStockModal(); init(); } 
                else { showToast("อัปโหลดพลาด: " + res.error, "error"); }
            } catch(e) { showToast("อัปโหลดไม่สำเร็จ", "error"); }
            btn.innerHTML = `<i data-lucide="image" class="w-4 h-4"></i> อัปโหลดรูป`; btn.disabled = false; lucide.createIcons();
        };
        reader.readAsDataURL(file);
    }

    async function init() {
      try {
        const resp = await fetch(`${API_URL}?action=get&t=${Date.now()}`);
        inventory = await resp.json();
        renderMachineMenu();
        renderCards(currentMachine);
        document.getElementById('status-dot').className = "w-3 h-3 rounded-full bg-green-500 shrink-0";
      } catch (e) { document.getElementById('status-dot').className = "w-3 h-3 rounded-full bg-red-500 shrink-0"; }
    }

    window.addEventListener('DOMContentLoaded', async () => {
      lucide.createIcons(); renderMachineMenu();
      if (localStorage.getItem('ink_logged_in') === 'true') {
        document.getElementById('login-view').classList.remove('active'); document.getElementById('main-view').classList.add('active');
        init(); setInterval(init, 10000); // รีเฟรชอัตโนมัติทุก 10 วินาที
      } else {
        document.getElementById('main-view').classList.remove('active'); document.getElementById('login-view').classList.add('active');
      }
    });

    async function handleLogin() {
      const u = document.getElementById('login-user').value.trim(), p = document.getElementById('login-pass').value.trim();
      updateLoadingBar(30);
      try {
        const r = await fetch(`${API_URL}?action=getUsers&t=${Date.now()}`); usersDB = await r.json(); updateLoadingBar(80);
        const found = usersDB.find(x => x[0] === u && x[1] === p);
        if (found) {
            localStorage.setItem('ink_logged_in', 'true'); localStorage.setItem('ink_user_role', found[2]); localStorage.setItem('ink_current_user', u);
            location.reload();
        } else { document.getElementById('login-error').classList.remove('hidden'); updateLoadingBar(0, false); }
      } catch(e) { usersDB = [['admin','admin','admin']]; } // เผื่อกรณีเริ่มระบบครั้งแรก
    }
    function handleLogout() { localStorage.clear(); location.reload(); }
    function closeModal() { document.getElementById('modal').classList.remove('modal-show'); }
    function toggleSidebarMobile(s) { const sb = document.getElementById('sidebar'), ov = document.getElementById('sidebar-overlay'); if(s){sb.classList.replace('sidebar-mobile-hide','sidebar-mobile-show'); ov.classList.remove('hidden');}else{sb.classList.replace('sidebar-mobile-show','sidebar-mobile-hide'); ov.classList.add('hidden');} }
    function showToast(m, t) { const c = document.getElementById('toast-container'), toast = document.createElement('div'); toast.className = `${t==='success'?'bg-slate-800':'bg-red-600'} text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 transform translate-y-10 opacity-0 transition-all font-bold`; toast.innerHTML = `<i data-lucide="${t==='success'?'check':'alert-triangle'}" class="w-5 h-5 shrink-0"></i><span class="text-sm uppercase">${m}</span>`; c.appendChild(toast); lucide.createIcons(); setTimeout(() => toast.classList.remove('translate-y-10','opacity-0'), 10); setTimeout(() => { toast.classList.add('translate-y-10','opacity-0'); setTimeout(() => toast.remove(), 500); }, 2000); }
  </script>
</body>
</html>
