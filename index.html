<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Smart Ink Pro - Tanapong</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: 'Kanit', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f1f5f9; }
    .sidebar-active { background: rgba(255,255,255,0.15); border-left: 4px solid #fff; opacity: 1 !important; }
    .modal-show { opacity: 1 !important; pointer-events: auto !important; visibility: visible !important; }
    .sidebar-mobile-hide { transform: translateX(-100%); }
    .sidebar-mobile-show { transform: translateX(0); }
    
    #top-loading-bar {
      position: fixed; top: 0; left: 0; height: 3px;
      background: linear-gradient(to right, #0ea5e9, #001b6e);
      z-index: 10000; width: 0%; opacity: 0;
      transition: width 0.3s ease, opacity 0.3s ease;
    }

    #login-view, #main-view { display: none; min-height: 100vh; width: 100%; }
    #login-view.active { display: flex; background-color: #001b6e; }
    #main-view.active { display: flex; background-color: #f1f5f9; }
    @media (max-width: 767px) { #main-view.active { display: block; } }
    @media print { aside, header, .nav-btn, #toast-container { display: none !important; } .p-8 { padding: 0 !important; } }
    
    input[type="date"] { position: relative; font-family: 'Kanit', sans-serif; }
    input[type="date"]::-webkit-calendar-picker-indicator {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10;
    }
  </style>
</head>
<body class="min-h-screen text-slate-800 overflow-x-hidden">

  <div id="top-loading-bar"></div>

  <div id="login-view" class="fixed inset-0 flex flex-col items-center justify-center p-4 z-[2000]">
    <div class="mb-6 text-center text-white">
      <div class="bg-white p-4 rounded-3xl shadow-xl mb-4 inline-block"><i data-lucide="printer" class="w-12 h-12 text-[#001b6e]"></i></div>
      <h1 class="text-3xl font-bold tracking-tight uppercase italic">Ink Stock Pro</h1>
      <p class="text-sm opacity-70 mt-1 uppercase tracking-widest font-medium">Tanapong Logistic System</p>
    </div>
    <div class="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl p-8 relative border border-slate-100">
      <div id="login-error" class="hidden mb-4 p-4 bg-red-50 text-red-600 rounded-2xl text-xs font-bold border border-red-100 flex items-center gap-2"><i data-lucide="alert-triangle" class="w-4 h-4"></i><span id="login-error-text">ข้อผิดพลาด</span></div>
      <div class="space-y-4">
        <div><label class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-1.5 pl-1 font-bold">ชื่อผู้ใช้งาน</label><input type="text" id="login-user" onkeypress="if(event.key==='Enter') document.getElementById('login-btn-action').click()" placeholder="Username" class="w-full px-5 py-3.5 rounded-2xl bg-slate-50 border-2 border-slate-100 outline-none focus:border-blue-500 text-sm font-semibold transition-all font-bold"></div>
        <div><label class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-1.5 pl-1 font-bold">รหัสผ่าน</label><input type="password" id="login-pass" onkeypress="if(event.key==='Enter') document.getElementById('login-btn-action').click()" placeholder="••••••••" class="w-full px-5 py-3.5 rounded-2xl bg-slate-50 border-2 border-slate-100 outline-none focus:border-blue-500 text-sm font-semibold transition-all font-bold"></div>
        <button id="login-btn-action" onclick="handleLogin()" class="w-full bg-[#102a96] text-white py-4 rounded-2xl font-bold hover:bg-blue-800 shadow-xl transition-all active:scale-95 font-bold">เข้าสู่ระบบ</button>
      </div>
    </div>
  </div>

  <div id="main-view" class="w-full min-h-screen md:flex-row relative">
    <header class="md:hidden bg-[#001b6e] text-white p-4 flex justify-between items-center sticky top-0 z-[1001] shadow-lg">
      <div class="flex items-center gap-3 font-bold"><i data-lucide="printer" class="w-6 h-6"></i><span class="font-bold text-sm uppercase">Ink System</span></div>
      <button onclick="toggleSidebarMobile(true)" class="p-2 bg-white/10 rounded-xl font-bold"><i data-lucide="menu"></i></button>
    </header>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-[#001b6e] text-white flex flex-col shadow-2xl z-[1002] transition-transform duration-300 sidebar-mobile-hide md:translate-x-0 md:sticky md:top-0 md:h-screen shrink-0">
      <div class="p-8 border-b border-white/10 text-center hidden md:block"><h1 class="text-xl md:text-2xl font-bold tracking-tighter uppercase italic font-bold">Ink System</h1></div>
      <nav class="flex-1 p-4 space-y-1 overflow-y-auto font-bold">
        <button onclick="changeView('all'); toggleSidebarMobile(false)" id="nav-all" class="nav-btn w-full flex items-center gap-3 p-4 rounded-xl hover:bg-white/5 transition sidebar-active font-bold"><i data-lucide="layout-grid"></i> หน้ารวมทั้งหมด</button>
        <button onclick="changeView('summary'); toggleSidebarMobile(false)" id="nav-summary" class="nav-btn w-full flex items-center gap-3 p-4 rounded-xl hover:bg-white/5 transition opacity-60 font-bold"><i data-lucide="bar-chart-3"></i> สรุปและรายงาน</button>
        <button onclick="changeView('users'); toggleSidebarMobile(false)" id="nav-users" class="nav-btn w-full flex items-center gap-3 p-4 rounded-xl hover:bg-white/5 transition opacity-60 hidden text-orange-300 font-bold"><i data-lucide="users"></i> จัดการผู้ใช้งาน</button>
        <div class="pt-6 pb-2 px-4 text-[12px] font-bold text-blue-300 uppercase tracking-widest border-t border-white/5 mt-4 font-bold">Machine</div>
        <div id="machine-menu" class="space-y-1"></div>
      </nav>
      <div class="p-4 border-t border-white/10"><button onclick="handleLogout()" class="w-full flex items-center justify-center gap-2 p-3 rounded-xl bg-red-600/20 hover:bg-red-600 transition text-sm font-medium font-bold"><i data-lucide="log-out" class="w-4 h-4"></i> ออกจากระบบ</button></div>
    </aside>

    <div id="sidebar-overlay" onclick="toggleSidebarMobile(false)" class="fixed inset-0 bg-black/50 z-[1000] hidden md:hidden"></div>

    <div class="flex-1 flex flex-col min-w-0">
      <header class="bg-white p-4 md:p-6 shadow-sm flex justify-between items-center sticky top-0 z-50">
        <h2 id="page-title" class="text-lg md:text-xl font-bold uppercase truncate font-bold">All Items</h2>
        <div class="flex items-center gap-3 relative ml-auto font-bold">
          <div id="status-dot" class="w-3 h-3 rounded-full bg-slate-300"></div>
          <input type="text" id="search" onkeyup="filter()" placeholder="ค้นหา..." class="px-4 py-2 rounded-full bg-slate-100 text-xs md:text-sm outline-none w-32 md:w-64 focus:ring-2 focus:ring-blue-500 transition-all font-bold">
          <div class="static md:relative inline-block">
            <button id="bell-btn" onclick="toggleNotification()" class="relative p-2.5 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-full outline-none font-bold"><i data-lucide="bell" class="w-5 h-5 font-bold"></i><span id="bell-badge" class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full hidden"></span></button>
            <div id="notification-panel" class="fixed md:absolute top-16 md:top-auto right-4 left-4 md:right-0 md:left-auto md:mt-3 md:w-96 bg-white rounded-[2rem] shadow-2xl border border-slate-100 p-5 hidden z-[100] max-h-[70vh] overflow-y-auto">
              <h4 class="font-bold text-sm text-slate-800 mb-3 border-b pb-2 font-bold">ประวัติการดำเนินการ</h4>
              <div id="notification-list" class="space-y-3 text-xs"></div>
            </div>
          </div>
        </div>
      </header>

      <div class="p-4 md:p-8 flex-1 min-w-0">
        <div id="inventory-view" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 font-bold"></div>
        
        <div id="summary-view" class="hidden space-y-6">
          <div class="bg-white p-6 md:p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
            <div class="flex flex-wrap justify-between items-center mb-8 gap-4 font-bold">
              <h3 class="font-bold text-lg uppercase italic font-bold">สถิติเบิกจ่ายรวม</h3>
              <div class="flex flex-wrap items-center gap-2 text-[10px] font-bold">
                <button onclick="exportExcel()" class="px-4 py-2 bg-green-600 text-white rounded-xl font-bold">EXCEL</button>
                <button onclick="window.print()" class="px-4 py-2 bg-red-600 text-white rounded-xl font-bold">PDF</button>
                <select id="chart-type" onchange="loadChart()" class="bg-slate-100 rounded-xl px-2 py-2 font-bold outline-none font-bold"><option value="line">กราฟเส้น</option><option value="bar">กราฟแท่ง</option></select>
                <select id="chart-filter" onchange="loadChart()" class="bg-slate-100 rounded-xl px-2 py-2 font-bold outline-none font-bold"><option value="OUT">เบิกออก</option><option value="IN">รับเข้า</option><option value="both">ดูทั้งหมด</option></select>
                
                <div class="relative inline-block text-left font-bold" id="machine-select-container">
                  <button type="button" onclick="toggleMachineDropdown()" class="bg-slate-100 rounded-xl px-3 py-2 font-bold outline-none flex items-center gap-1.5 text-slate-700">
                    <span id="machine-select-label">ทุกเครื่อง</span>
                    <i data-lucide="chevron-down" class="w-3 h-3"></i>
                  </button>
                  <div id="machine-select-dropdown" class="absolute right-0 mt-1 w-48 bg-white rounded-xl shadow-xl border border-slate-100 p-3 hidden z-[110] max-h-60 overflow-y-auto space-y-2 text-left">
                    <label class="flex items-center gap-2 cursor-pointer py-1 px-1.5 hover:bg-slate-50 rounded-lg text-slate-700">
                      <input type="checkbox" id="chk-m-all" checked onchange="toggleAllMachines(this)" class="rounded text-blue-600 focus:ring-blue-500 w-3.5 h-3.5">
                      <span>ทุกเครื่อง</span>
                    </label>
                    <div id="machine-checkboxes-list" class="space-y-2 border-t pt-2 border-slate-100"></div>
                  </div>
                </div>
                
                <div class="flex items-center bg-slate-100 rounded-[1rem] px-2 py-1 gap-1 border border-slate-200">
                  <div class="relative flex items-center gap-1.5 px-2 py-1.5 hover:bg-slate-200 rounded-lg transition overflow-hidden">
                    <i data-lucide="calendar" class="w-4 h-4 text-slate-500 pointer-events-none z-0"></i>
                    <input type="date" id="chart-date-start" onchange="loadChart()" class="bg-transparent text-xs font-bold outline-none text-slate-700 w-[95px] cursor-pointer relative z-10">
                  </div>
                  <span class="text-xs text-slate-400 font-bold px-1">-</span>
                  <div class="relative flex items-center gap-1.5 px-2 py-1.5 hover:bg-slate-200 rounded-lg transition overflow-hidden">
                    <input type="date" id="chart-date-end" onchange="loadChart()" class="bg-transparent text-xs font-bold outline-none text-slate-700 w-[95px] cursor-pointer relative z-10">
                  </div>
                </div>

              </div>
            </div>
            <div class="h-[400px] md:h-[500px] font-bold"><canvas id="mainChart"></canvas></div>
          </div>
        </div>

        <div id="users-view" class="hidden space-y-6 font-bold">
          <div class="bg-white p-6 md:p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
            <div class="mb-6 flex justify-between items-center border-b pb-4">
              <h3 class="text-lg font-bold text-slate-800 font-bold">จัดการผู้ใช้งานระบบ</h3>
              <button onclick="openAdminUserActionModal(null)" class="bg-[#102a96] text-white px-5 py-2.5 rounded-xl text-xs font-bold hover:bg-blue-800 shadow-md flex items-center gap-2 font-bold"><i data-lucide="user-plus" class="w-4 h-4"></i> เพิ่มพนักงานใหม่</button>
            </div>
            <div id="user-management-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center opacity-0 pointer-events-none transition-all z-[1500] p-4 text-center">
    <div class="bg-white w-full max-w-sm rounded-[3.5rem] shadow-2xl p-8 scale-95 transition-transform duration-300">
      <div id="modal-color" class="w-16 h-16 rounded-2xl mx-auto mb-4 border border-slate-50 shadow-inner"></div>
      <h3 id="modal-title" class="text-2xl font-bold mb-1 text-slate-800 font-bold"></h3>
      <p id="modal-sub" class="text-[10px] text-slate-400 mb-6 uppercase break-all font-bold tracking-widest"></p>
      <div class="mb-4 text-left">
        <label class="block text-[10px] font-extrabold text-slate-400 uppercase mb-1.5 pl-1 font-bold">ระบุจำนวนสินค้า</label>
        <input type="number" id="modal-qty" min="1" onkeypress="if(event.key==='-'||event.key==='e') return false; if(event.key==='Enter') document.getElementById('modal-submit').click()" class="w-full text-center text-4xl font-bold p-5 bg-slate-50 rounded-3xl border-2 border-slate-100 outline-none focus:border-blue-500 transition-all font-bold">
      </div>
      <div id="modal-remark-container" class="mb-8 text-left"><label class="block text-[10px] font-extrabold text-slate-400 uppercase mb-1.5 pl-1 font-bold">หมายเหตุ</label><input type="text" id="modal-remark" onkeypress="if(event.key==='Enter') document.getElementById('modal-submit').click()" placeholder="..." class="w-full px-5 py-3 rounded-2xl bg-slate-50 border-2 border-slate-100 outline-none text-sm font-semibold font-bold"></div>
      <div class="flex gap-4 font-bold">
        <button onclick="closeModal()" class="flex-1 py-4 bg-slate-100 text-slate-500 font-bold rounded-2xl hover:bg-slate-200 transition">ยกเลิก</button>
        <button id="modal-submit" class="flex-1 py-4 bg-[#102a96] text-white font-bold rounded-2xl shadow-xl">ตกลง</button>
      </div>
    </div>
  </div>

  <div id="admin-action-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center opacity-0 pointer-events-none transition-all z-[1600] p-4 text-center">
    <div class="bg-white w-full max-w-sm rounded-[3rem] shadow-2xl p-10 scale-95 transition-transform duration-300">
      <div id="admin-action-icon" class="w-16 h-16 rounded-2xl mx-auto mb-6 flex items-center justify-center text-white text-xl font-bold shadow-inner font-bold"></div>
      <h3 id="admin-action-title" class="text-2xl font-bold mb-8 text-slate-800 font-bold"></h3>
      <div class="space-y-4 mb-8 text-left">
        <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1.5 pl-1 tracking-widest font-bold">Username</label><input type="text" id="admin-action-user" onkeypress="if(event.key==='Enter') document.getElementById('admin-action-submit').click()" class="w-full px-5 py-3.5 rounded-2xl bg-slate-50 border-2 border-slate-100 outline-none focus:border-blue-500 text-sm font-semibold font-bold"></div>
        <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1.5 pl-1 tracking-widest font-bold">Password (8+)</label><input type="password" id="admin-action-pass" onkeypress="if(event.key==='Enter') document.getElementById('admin-action-submit').click()" class="w-full px-5 py-3.5 rounded-2xl bg-slate-50 border-2 border-slate-100 outline-none focus:border-blue-500 text-sm font-semibold font-bold"></div>
      </div>
      <div class="flex gap-4"><button onclick="closeAdminActionModal()" class="flex-1 py-4 bg-slate-100 text-slate-500 font-bold rounded-2xl hover:bg-slate-200 transition">ยกเลิก</button><button id="admin-action-submit" class="flex-1 py-4 bg-[#102a96] text-white font-bold rounded-2xl shadow-xl">บันทึก</button></div>
    </div>
  </div>

  <div id="confirm-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center opacity-0 pointer-events-none transition-all z-[1700] p-4 text-center">
    <div class="bg-white w-full max-w-sm rounded-[3rem] shadow-2xl p-10 scale-95 transition-transform duration-300">
      <div class="w-16 h-16 rounded-full bg-red-50 text-red-500 mx-auto mb-6 flex items-center justify-center border border-red-100 shadow-inner font-bold"><i data-lucide="trash-2"></i></div>
      <h3 class="text-2xl font-bold mb-2 text-slate-800 font-bold">ยืนยันการลบ?</h3>
      <p id="confirm-msg" class="text-sm text-slate-400 mb-8 font-medium px-4"></p>
      <div class="flex gap-4"><button onclick="closeConfirm()" class="flex-1 py-4 bg-slate-100 text-slate-500 font-bold rounded-2xl hover:bg-slate-200">ยกเลิก</button><button id="confirm-btn" class="flex-1 py-4 bg-red-600 text-white font-bold rounded-2xl hover:bg-red-700 shadow-xl transition-all">ลบทิ้ง</button></div>
    </div>
  </div>

  <div id="admin-stock-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center opacity-0 pointer-events-none transition-all z-[1800] p-4 text-center">
    <div class="bg-white w-full max-w-sm rounded-[3rem] shadow-2xl p-10 scale-95 transition-transform duration-300">
      <div id="admin-stock-color" class="w-16 h-16 rounded-2xl mx-auto mb-4 shadow-inner border"></div>
      <h3 class="text-2xl font-bold mb-2 text-slate-800 font-bold">แก้ไขยอดสต็อก</h3>
      <p id="admin-stock-sub" class="text-[10px] text-slate-400 mb-8 uppercase break-all font-bold"></p>
      <div class="mb-8 text-left">
        <label class="block text-[10px] font-extrabold text-slate-400 uppercase mb-1.5">ยอดคงเหลือใหม่</label>
        <input type="number" id="admin-stock-qty" min="0" onkeypress="if(event.key==='-'||event.key==='e') return false; if(event.key==='Enter') document.getElementById('admin-stock-submit').click()" class="w-full text-center text-4xl font-bold p-5 bg-slate-50 rounded-3xl border-2 border-slate-100 outline-none focus:border-blue-500 transition-all">
      </div>
      <div class="flex gap-4"><button onclick="closeAdminStockModal()" class="flex-1 py-4 bg-slate-100 text-slate-500 font-bold rounded-2xl">ยกเลิก</button><button id="admin-stock-submit" class="flex-1 py-4 bg-[#102a96] text-white font-bold rounded-2xl shadow-xl">บันทึก</button></div>
    </div>
  </div>

  <div id="log-detail-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center opacity-0 pointer-events-none transition-all z-[1900] p-4 text-center">
    <div class="bg-white w-full max-w-sm rounded-[3rem] shadow-2xl p-8 scale-95 transition-transform duration-300 relative text-left">
      <button onclick="document.getElementById('log-detail-modal').classList.remove('modal-show')" class="absolute top-6 right-6 p-2 bg-slate-100 text-slate-500 rounded-full hover:bg-slate-200 transition-all"><i data-lucide="x" class="w-4 h-4"></i></button>
      <div class="w-14 h-14 rounded-2xl bg-blue-50 text-[#102a96] flex items-center justify-center mb-6 shadow-inner"><i data-lucide="file-text" class="w-6 h-6"></i></div>
      <h3 class="text-2xl font-bold mb-6 text-slate-800">รายละเอียดรายการ</h3>
      <div class="space-y-4 text-sm font-medium text-slate-600">
        <div class="flex justify-between border-b border-slate-50 pb-3"><span>วัน-เวลา:</span> <span id="log-det-date" class="text-slate-800 font-bold"></span></div>
        <div class="flex justify-between border-b border-slate-50 pb-3"><span>สินค้า:</span> <span id="log-det-id" class="text-slate-800 font-bold text-right break-words max-w-[70%]"></span></div>
        <div class="flex justify-between border-b border-slate-50 pb-3"><span>ประเภท:</span> <span id="log-det-type" class="text-slate-800 font-bold"></span></div>
        <div class="flex justify-between border-b border-slate-50 pb-3"><span>จำนวน:</span> <span id="log-det-qty" class="text-slate-800 font-bold text-lg"></span></div>
        <div class="flex justify-between border-b border-slate-50 pb-3"><span>ผู้ทำรายการ:</span> <span id="log-det-user" class="text-slate-800 font-bold"></span></div>
        <div class="flex justify-between"><span>หมายเหตุ:</span> <span id="log-det-remark" class="text-slate-800 font-bold text-right break-words max-w-[70%]"></span></div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[3000] flex flex-col gap-3 pointer-events-none w-full max-w-sm px-4"></div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwYEfq3voyoM-2gJU87uj_0ZDEL07byE41xrzmNoZoYnMW6k_JMB7ktWP5GWEr-UCFx/exec"; 
    let inventory = [], usersDB = [], currentMachine = 'all', currentModalTask = null, currentAdminUserTask = null, currentAdminStockTask = null, chartInstance = null;
    let cachedLogs = [], lastLogFetchTime = 0;

    // ฟังก์ชันเปิด/ปิด เมนูดร็อปดาวน์เลือกเครื่องจักรในหน้าสรุปรายงาน
    function toggleMachineDropdown() {
      const dp = document.getElementById('machine-select-dropdown');
      if (dp) dp.classList.toggle('hidden');
    }

    // ฟังก์ชันเมื่อกดเลือก "ทุกเครื่อง" ให้เคลียร์ช่องอื่นออก
    function toggleAllMachines(el) {
      if (el.checked) {
        document.querySelectorAll('.chk-machine').forEach(chk => chk.checked = false);
      }
      loadChart();
    }

    // ฟังก์ชันเมื่อมีการติ๊กเลือกเครื่องจักรรายตัว
    function onMachineCheckChange() {
      const chkAll = document.getElementById('chk-m-all');
      const checkedCount = document.querySelectorAll('.chk-machine:checked').length;
      if (chkAll) {
        if (checkedCount > 0) chkAll.checked = false;
        else chkAll.checked = true;
      }
      loadChart();
    }

    function updateLoadingBar(percent, show = true) {
      const bar = document.getElementById('top-loading-bar');
      if (!bar) return;

    async function exportExcel() {
      try {
        showToast("กำลังเตรียมไฟล์ Excel...", "success");
        const resp = await fetch(`${API_URL}?action=getLogs&t=${Date.now()}`);
        const logs = await resp.json();
        
        const dataRows = logs.slice(1).map(l => {
          let dateStr = l[0];
          if (dateStr) {
            const d = new Date(dateStr);
            if (!isNaN(d)) {
              const thaiTime = new Date(d.getTime() + (7 * 60 * 60 * 1000));
              const day = String(thaiTime.getUTCDate()).padStart(2, '0');
              const month = String(thaiTime.getUTCMonth() + 1).padStart(2, '0');
              const year = thaiTime.getUTCFullYear();
              const hours = String(thaiTime.getUTCHours()).padStart(2, '0');
              const minutes = String(thaiTime.getUTCMinutes()).padStart(2, '0');
              const seconds = String(thaiTime.getUTCSeconds()).padStart(2, '0');
              dateStr = `${day}/${month}/${year} ${hours}:${minutes}:${seconds}`;
            }
          }
          return `${dateStr},` + l.slice(1).map(v => (v !== null && v !== undefined ? v : '')).join(',');
        }).join("\n");
        
        const headerRow = logs[0] ? logs[0].join(',') : "วันที่,รหัสสินค้า,ประเภท,จำนวน,หมายเหตุ,ผู้ทำรายการ";
        const csvContent = "data:text/csv;charset=utf-8,\uFEFF" + headerRow + "\n" + dataRows;
        
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "ink_history_report.csv");
        document.body.appendChild(link); 
        link.click(); 
        link.remove();
        showToast("ดาวน์โหลดสำเร็จ", "success");
      } catch (error) {
        showToast("เกิดข้อผิดพลาดในการโหลดข้อมูล", "error");
      }
    }

    function renderMachines() { 
      let openGroups = [];
      document.querySelectorAll('[id^="g-"]').forEach(el => {
        if (!el.classList.contains('hidden')) openGroups.push(el.id);
      });

      const list = [...new Set(inventory.map(i => i.machine))].filter(m => m && String(m).trim() !== ''); 
      
      const groups = { 'Cylinder': [], 'Flatbase': [], 'DTF & UV DTF': [], 'DTG': [], 'Other': [] };
      
      list.forEach(m => {
        const lowerM = m.toLowerCase();
        if (lowerM.includes('cylinder')) groups['Cylinder'].push(m);
        else if (lowerM.includes('flatbase')) groups['Flatbase'].push(m);
        else if (lowerM.includes('dtf')) groups['DTF & UV DTF'].push(m);
        else if (lowerM.includes('dtg')) groups['DTG'].push(m);
        else groups['Other'].push(m);
      });

      let html = '';
      for (const [groupName, machines] of Object.entries(groups)) {
        if (machines.length > 0) {
          const safeName = groupName.replace(/[^a-zA-Z0-9]/g, '');
          const gId = 'g-' + safeName;
          const iId = 'i-' + safeName;
          const isOpen = openGroups.includes(gId);
          
          html += `<button onclick="document.getElementById('${gId}').classList.toggle('hidden'); document.getElementById('${iId}').classList.toggle('rotate-180')" class="w-full flex items-center justify-between pt-4 pb-2 px-4 text-[10px] font-bold text-blue-300/70 hover:text-blue-300 uppercase tracking-widest outline-none transition-all"><span>${groupName}</span><i id="${iId}" data-lucide="chevron-down" class="w-3 h-3 transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}"></i></button>`;
          html += `<div id="${gId}" class="${isOpen ? 'flex' : 'hidden'} flex-col space-y-1">`;
          html += machines.map(m => `<button onclick="changeView('machine', '${m}'); toggleSidebarMobile(false)" id="nav-${m.replace(/\s/g, '')}" class="nav-btn w-full flex items-center gap-3 p-3 pl-6 rounded-xl hover:bg-white/5 transition opacity-75 text-xs text-left font-bold"><i data-lucide="${m.toLowerCase().includes('cylinder')?'layers':'monitor'}"></i><span class="truncate font-bold">${m}</span></button>`).join('');
          html += `</div>`;
        }
      }

      document.getElementById('machine-menu').innerHTML = html; 
      
      const mListDiv = document.getElementById('machine-checkboxes-list');
      if (mListDiv) {
        const checkedMachines = Array.from(document.querySelectorAll('.chk-machine:checked')).map(el => el.value);
        mListDiv.innerHTML = list.map(m => {
          const isChecked = checkedMachines.includes(m);
          return `
            <label class="flex items-center gap-2 cursor-pointer py-1 px-1.5 hover:bg-slate-50 rounded-lg text-slate-700 font-bold text-left">
              <input type="checkbox" value="${m}" ${isChecked ? 'checked' : ''} onchange="onMachineCheckChange()" class="chk-machine rounded text-blue-600 focus:ring-blue-500 w-3.5 h-3.5">
              <span class="truncate">${m}</span>
            </label>
          `;
        }).join('');
      }
      lucide.createIcons(); 
    }

    async function loadNotificationHistory() { 
      try { 
        const resp = await fetch(`${API_URL}?action=getLogs&t=${Date.now()}`); 
        const logs = await resp.json(); 
        const list = document.getElementById('notification-list'); 
        if (logs.length <= 1) { 
          list.innerHTML = '<p class="text-center py-4 text-slate-400 font-medium text-xs">ไม่มีประวัติ</p>'; 
          return; 
        } 
        const recent = logs.slice(1).reverse().slice(0, 100); 
        document.getElementById('bell-badge').classList.remove('hidden'); 
        
        list.innerHTML = recent.map(l => {
          const dt = new Date(l[0]);
          const timeStr = `${String(dt.getDate()).padStart(2, '0')}/${String(dt.getMonth() + 1).padStart(2, '0')}/${dt.getFullYear()} ${dt.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})}`;
          const fullDateStr = dt.toLocaleString('th-TH',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
          const safeId = String(l[1]).replace(/'/g, "\\'");
          const safeUser = String(l[4] || '-').replace(/'/g, "\\'");
          const safeRemark = String(l[5] || '-').replace(/'/g, "\\'");
          
          return `<div onclick="showLogDetail('${fullDateStr}', '${safeId}', '${l[2]}', '${l[3]}', '${safeUser}', '${safeRemark}')" class="py-2.5 border-b border-slate-100 last:border-0 cursor-pointer hover:bg-slate-50 px-2 -mx-2 rounded-xl transition-all"><div class="flex justify-between items-center mb-1"><span class="text-xs font-bold text-slate-700 truncate pr-2">${l[1]}</span><span class="text-[9px] text-slate-400 font-medium shrink-0">${timeStr}</span></div><div class="text-[11px] font-bold text-slate-500">${l[2]==='IN'?'รับเข้า':l[2]==='OUT'?'เบิกออก':'แก้ไขเป็น'} <span class="text-slate-800">${l[3]}</span> ชิ้น</div></div>`;
        }).join(''); 
      } catch(e){} 
    }
    
    async function loadChart() { 
      if (Date.now() - lastLogFetchTime > 15000) {
        document.getElementById('status-dot').className = "w-3 h-3 rounded-full bg-orange-500 animate-spin";
        const resp = await fetch(`${API_URL}?action=getLogs&t=${Date.now()}`); 
        cachedLogs = (await resp.json()).slice(1);
        lastLogFetchTime = Date.now();
        document.getElementById('status-dot').className = "w-3 h-3 rounded-full bg-green-500";
      }

      const logs = cachedLogs;
      
      const startDateInput = document.getElementById('chart-date-start') ? document.getElementById('chart-date-start').value : '';
      const endDateInput = document.getElementById('chart-date-end') ? document.getElementById('chart-date-end').value : '';
      const filter = document.getElementById('chart-filter').value, cType = document.getElementById('chart-type').value; 
      
      const chkAll = document.getElementById('chk-m-all');
      const allChecked = chkAll ? chkAll.checked : true;
      const checkedBoxes = Array.from(document.querySelectorAll('.chk-machine:checked')).map(el => el.value);
      
      const labelObj = document.getElementById('machine-select-label');
      if (labelObj) {
        if (allChecked || checkedBoxes.length === 0) {
          labelObj.innerText = "ทุกเครื่อง";
        } else if (checkedBoxes.length === 1) {
          labelObj.innerText = checkedBoxes[0];
        } else {
          labelObj.innerText = `เลือกแล้ว (${checkedBoxes.length})`;
        }
      }

      const formatCE = (d) => { const dt = new Date(d); return `${String(dt.getDate()).padStart(2, '0')}/${String(dt.getMonth() + 1).padStart(2, '0')}/${dt.getFullYear()}`; };
      
      let dates = []; 
      if (startDateInput && endDateInput) {
        let start = new Date(startDateInput);
        let end = new Date(endDateInput);
        if (start > end) { const temp = start; start = end; end = temp; }
        let current = new Date(start);
        while (current <= end) { dates.push(formatCE(current)); current.setDate(current.getDate() + 1); }
      } else if (startDateInput) {
        let baseDate = new Date(startDateInput);
        for (let i = 0; i <= 6; i++) { const d = new Date(baseDate); d.setDate(d.getDate() + i); dates.push(formatCE(d)); }
      } else if (endDateInput) {
        let baseDate = new Date(endDateInput);
        for (let i = 6; i >= 0; i--) { const d = new Date(baseDate); d.setDate(d.getDate() - i); dates.push(formatCE(d)); }
      } else {
        let baseDate = new Date();
        for (let i = 6; i >= 0; i--) { const d = new Date(baseDate); d.setDate(d.getDate() - i); dates.push(formatCE(d)); }
      }

      const filteredInv = allChecked || checkedBoxes.length === 0 ? inventory : inventory.filter(i => checkedBoxes.includes(i.machine)); 
      const inkTypes = [...new Set(filteredInv.map(i => i.type))]; 
      
      const datasets = inkTypes.map(ink => { 
        const itemInfo = filteredInv.find(inv => inv.type === ink); 
        return { 
          label: ink, 
          data: dates.map(d => logs.filter(l => { 
            const invItem = inventory.find(inv => inv.id === l[1]); 
            return formatCE(l[0]) === d && invItem?.type === ink && (allChecked || checkedBoxes.length === 0 || checkedBoxes.includes(invItem?.machine)); 
          }).reduce((sum, curr) => sum + (curr[2] === 'EDIT' ? 0 : (filter === 'both' ? curr[3] : (curr[2] === filter ? curr[3] : 0))), 0)), 
          borderColor: itemInfo ? itemInfo.hex : '#cbd5e1', backgroundColor: (itemInfo ? itemInfo.hex : '#cbd5e1')+'20', tension: 0.4, fill: true 
        }; 
      }).filter(ds => ds.data.some(v => v > 0)); 
      
      if (chartInstance) chartInstance.destroy(); 
      chartInstance = new Chart(document.getElementById('mainChart'), { type: cType, data: { labels: dates, datasets: datasets }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } } }); 
    }
    
    document.addEventListener('click', (e) => { 
      const panel = document.getElementById('notification-panel'); 
      const btn = document.getElementById('bell-btn'); 
      if (panel && !panel.classList.contains('hidden') && !panel.contains(e.target) && !btn.contains(e.target)) panel.classList.add('hidden'); 
      
      const machPanel = document.getElementById('machine-select-dropdown');
      const machBtn = document.getElementById('machine-select-container');
      if (machPanel && !machPanel.classList.contains('hidden') && !machPanel.contains(e.target) && !machBtn.contains(e.target)) {
        machPanel.classList.add('hidden');
      }
    });
  </script>
</body>
