<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Smart Ink Pro - Tanapong</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: 'Kanit', sans-serif; }
    .sidebar-active { background: rgba(255,255,255,0.15); border-left: 4px solid #fff; opacity: 1 !important; }
    .modal-show { opacity: 1 !important; pointer-events: auto !important; }
    @media print { aside, header, .nav-btn, #toast-container { display: none !important; } .p-8 { padding: 0 !important; } }
  </style>
</head>
<body class="bg-[#f1f5f9] min-h-screen text-slate-800 flex flex-col md:flex-row overflow-x-hidden">

  <div id="login-view" class="fixed inset-0 bg-[#001b6e] flex flex-col items-center justify-center p-4 z-[1000] transition-opacity duration-500 overflow-y-auto">
    <div class="mb-6 text-center text-white">
      <div class="bg-white p-4 rounded-3xl shadow-xl mb-4 inline-block"><i data-lucide="printer" class="w-12 h-12 text-[#001b6e]"></i></div>
      <h1 class="text-3xl font-bold tracking-tight uppercase">Ink Stock Pro</h1>
      <p class="text-sm opacity-70 mt-1 uppercase tracking-widest">Authentication Required</p>
    </div>

    <div class="bg-white w-full max-w-sm rounded-[2.5rem] shadow-[0_25px_60px_-15px_rgba(0,0,0,0.3)] p-8 relative border border-slate-100">
      <div id="login-error" class="hidden mb-4 p-3 bg-red-50 text-red-600 rounded-2xl text-xs font-medium flex items-center gap-2">
        <i data-lucide="alert-circle" class="w-4 h-4"></i>
        <span id="login-error-text">ข้อผิดพลาด</span>
      </div>

      <div id="form-login">
        <h3 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2"><i data-lucide="lock" class="w-5 h-5 text-blue-600"></i> เข้าสู่ระบบ</h3>
        <div class="mb-4">
          <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">ชื่อผู้ใช้งาน</label>
          <input type="text" id="login-user" placeholder="Username" class="w-full px-5 py-3.5 rounded-2xl bg-slate-50 border-2 border-slate-100 outline-none focus:border-blue-500 text-sm font-medium transition-all">
        </div>
        <div class="mb-6">
          <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">รหัสผ่าน</label>
          <input type="password" id="login-pass" placeholder="••••••••" class="w-full px-5 py-3.5 rounded-2xl bg-slate-50 border-2 border-slate-100 outline-none focus:border-blue-500 text-sm font-medium transition-all">
        </div>
        <button onclick="handleLogin()" class="w-full bg-[#102a96] text-white py-4 rounded-2xl font-bold hover:bg-blue-800 shadow-lg shadow-blue-200 transition mb-5">เข้าสู่ระบบ</button>
        
        <div class="flex items-center my-6">
          <div class="flex-1 h-px bg-slate-100"></div>
          <span class="px-3 text-[10px] text-slate-400 font-bold uppercase">หรือ</span>
          <div class="flex-1 h-px bg-slate-100"></div>
        </div>

        <button onclick="openGoogleAuthModal()" class="w-full flex items-center justify-center gap-3 bg-white border-2 border-slate-200 text-slate-700 py-3 rounded-2xl font-bold hover:bg-slate-50 hover:border-slate-300 transition-all text-xs shadow-sm">
          <svg class="w-4 h-4" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.24-.73-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.85z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.85c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          ล็อกอินด้วย Google
        </button>
      </div>
    </div>
  </div>

  <div id="main-view" class="w-full min-h-screen flex flex-col md:flex-row hidden relative">
    <aside class="w-full md:w-72 bg-[#001b6e] text-white flex flex-col shadow-2xl md:sticky md:top-0 md:h-screen z-25 shrink-0">
      <div class="p-6 md:p-8 border-b border-white/10 text-center"><h1 class="text-xl md:text-2xl font-bold tracking-tighter uppercase">Ink System</h1></div>
      <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
        <button onclick="changeView('all')" id="nav-all" class="nav-btn w-full flex items-center gap-3 p-4 rounded-xl hover:bg-white/5 transition sidebar-active"><i data-lucide="layout-grid"></i> หน้ารวมทั้งหมด</button>
        <button onclick="changeView('summary')" id="nav-summary" class="nav-btn w-full flex items-center gap-3 p-4 rounded-xl hover:bg-white/5 transition opacity-60"><i data-lucide="bar-chart-3"></i> สรุปและรายงาน</button>
        <button onclick="changeView('users')" id="nav-users" class="nav-btn w-full flex items-center gap-3 p-4 rounded-xl hover:bg-white/5 transition opacity-60 hidden text-orange-300"><i data-lucide="users"></i> จัดการผู้ใช้งาน</button>
        <div class="pt-6 pb-2 px-4 text-[10px] font-bold text-blue-300 uppercase tracking-widest border-t border-white/5 mt-4">คลังเครื่องจักร</div>
        <div id="machine-menu" class="space-y-1"></div>
      </nav>
      <div class="p-4 border-t border-white/10"><button onclick="handleLogout()" class="w-full flex items-center justify-center gap-2 p-3 rounded-xl bg-red-600/20 hover:bg-red-600 transition text-sm font-medium"><i data-lucide="log-out" class="w-4 h-4"></i> ออกจากระบบ</button></div>
    </aside>

    <div class="flex-1 flex flex-col min-w-0">
      <header class="bg-white p-4 md:p-6 shadow-sm flex justify-between items-center sticky top-0 z-50">
        <h2 id="page-title" class="text-lg md:text-xl font-bold uppercase truncate">All Items</h2>
        <div class="flex items-center gap-3 relative ml-auto">
          <div class="relative inline-block">
            <button id="bell-btn" onclick="toggleNotification()" class="relative p-2.5 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-full transition outline-none">
              <i data-lucide="bell" class="w-5 h-5"></i>
              <span id="bell-badge" class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full hidden"></span>
            </button>
            <div id="notification-panel" class="absolute right-0 mt-3 w-80 sm:w-96 bg-white rounded-[2rem] shadow-2xl border border-slate-100 p-5 hidden z-[100] max-h-[420px] overflow-y-auto">
              <h4 class="font-bold text-sm text-slate-800 mb-3 border-b pb-2">ประวัติการดำเนินการ</h4>
              <div id="notification-list" class="space-y-3 text-xs"></div>
            </div>
          </div>
          <div id="status-dot" class="w-3 h-3 rounded-full bg-slate-300"></div>
          <input type="text" id="search" onkeyup="filter()" placeholder="ค้นหา..." class="px-4 py-2 rounded-full bg-slate-100 text-xs md:text-sm outline-none w-32 md:w-64 focus:ring-2 focus:ring-blue-500">
        </div>
      </header>

      <div class="p-4 md:p-8 flex-1 min-w-0">
        <div id="inventory-view" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        <div id="summary-view" class="hidden"><div class="bg-white p-6 rounded-[2.5rem] shadow-sm border h-[500px]"><canvas id="mainChart"></canvas></div></div>
        
        <div id="users-view" class="hidden space-y-6">
          <div class="bg-white p-6 md:p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
            <div class="mb-6 flex justify-between items-center border-b pb-4">
              <h3 class="text-lg font-bold text-slate-800">จัดการผู้ใช้งาน</h3>
              <button onclick="openAdminUserActionModal(null)" class="bg-[#102a96] text-white px-5 py-2.5 rounded-xl text-xs font-bold hover:bg-blue-800 shadow-md flex items-center gap-2"><i data-lucide="user-plus" class="w-4 h-4"></i> เพิ่มผู้ใช้</button>
            </div>
            <div id="user-management-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center opacity-0 pointer-events-none transition-all z-[60] p-4 text-center">
    <div class="bg-white w-full max-w-sm rounded-[3rem] shadow-2xl p-8 scale-95 transition-transform duration-300">
      <div id="modal-color" class="w-14 h-14 rounded-2xl mx-auto mb-4 flex items-center justify-center text-white text-xl font-bold shadow-inner"></div>
      <h3 id="modal-title" class="text-xl md:text-2xl font-bold mb-1"></h3>
      <p id="modal-sub" class="text-[10px] text-slate-400 mb-6 uppercase break-all"></p>
      <div class="mb-4"><label class="block text-[10px] font-bold text-slate-400 uppercase text-left mb-1 pl-1">ระบุจำนวน</label><input type="number" id="modal-qty" class="w-full text-center text-3xl font-bold p-4 bg-slate-50 rounded-2xl border-2 outline-none focus:border-blue-500"></div>
      <div id="modal-remark-container" class="mb-8 text-left hidden"><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 pl-1">หมายเหตุ</label><input type="text" id="modal-remark" class="w-full px-4 py-3 rounded-2xl bg-slate-50 border-2 outline-none focus:border-blue-500 text-sm"></div>
      <div class="flex gap-4"><button onclick="closeModal()" class="flex-1 py-3.5 bg-slate-100 text-slate-500 font-bold rounded-xl text-sm">ยกเลิก</button><button id="modal-submit" class="flex-1 py-3.5 bg-[#102a96] text-white font-bold rounded-xl text-sm hover:bg-blue-800">ตกลง</button></div>
    </div>
  </div>

  <div id="admin-action-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center opacity-0 pointer-events-none transition-all z-[70] p-4 text-center">
    <div class="bg-white w-full max-w-sm rounded-[3rem] shadow-2xl p-10 scale-95 transition-transform duration-300">
      <div id="admin-action-icon" class="w-14 h-14 rounded-2xl mx-auto mb-4 flex items-center justify-center text-white text-xl font-bold shadow-inner"></div>
      <h3 id="admin-action-title" class="text-2xl font-bold mb-8 text-slate-800"></h3>
      <div class="space-y-4 mb-8 text-left">
        <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Username (อังกฤษ/เลข)</label><input type="text" id="admin-action-user" class="w-full px-5 py-3 rounded-2xl bg-slate-50 border-2 outline-none focus:border-blue-500 text-sm"></div>
        <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Password (8 ตัวขึ้นไป)</label><input type="password" id="admin-action-pass" class="w-full px-5 py-3 rounded-2xl bg-slate-50 border-2 outline-none focus:border-blue-500 text-sm"></div>
      </div>
      <div class="flex gap-4"><button onclick="closeAdminActionModal()" class="flex-1 py-3.5 bg-slate-100 text-slate-500 font-bold rounded-2xl text-sm">ยกเลิก</button><button id="admin-action-submit" class="flex-1 py-3.5 bg-[#102a96] text-white font-bold rounded-2xl text-sm hover:bg-blue-800">บันทึก</button></div>
    </div>
  </div>

  <div id="google-auth-modal" class="fixed inset-0 bg-[#0c0d10]/80 backdrop-blur-md flex items-center justify-center opacity-0 pointer-events-none transition-all z-[90] p-4">
    <div class="bg-[#1f2023] w-full max-w-lg rounded-2xl shadow-2xl p-10 transform scale-95 transition-all duration-300 text-left text-white border border-slate-700/40">
      <div class="flex items-center gap-2 mb-8"><svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.24-.73-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.85z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.85c.87-2.6 3.3-4.53 6.16-4.53z"/></svg><span class="text-xs font-medium text-slate-300">Sign in with Google</span></div>
      <div id="google-account-list"><h3 class="text-3xl font-normal mb-8">เลือกบัญชี</h3>
        <div onclick="selectGoogleAccount('tanapongb2806@gmail.com', 'ธนพงษ์')" class="flex items-center gap-4 py-4 cursor-pointer hover:bg-white/5 border-t border-slate-700/60 transition-all"><div class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold">ธ</div><div><p class="text-sm font-semibold">ธนพงษ์</p><p class="text-xs text-slate-400">tanapongb2806@gmail.com</p></div></div>
        <div class="flex justify-between mt-8 text-xs text-slate-500"><button onclick="closeGoogleAuthModal()">ยกเลิก</button></div>
      </div>
      <div id="google-loading" class="hidden flex flex-col items-center py-12"><div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div><p class="text-sm font-medium">กำลังซิงค์โปรไฟล์...</p></div>
    </div>
  </div>

  <div id="toast-container" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[2000] flex flex-col gap-3 pointer-events-none w-full max-w-sm px-4"></div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzgBnotHKR7t66SqBKMgHCU_LPnOGFeducadyTZqydFlLmMX2Jb7TXHx3yidibhjn_M/exec"; 
    let inventory = [], currentMachine = 'all', currentModalTask = null, currentAdminUserTask = null, chartInstance = null;

    // ฐานข้อมูลผู้ใช้เริ่มต้น
    if (!localStorage.getItem('ink_user_database')) {
      localStorage.setItem('ink_user_database', JSON.stringify([{ user: 'admin', pass: 'admin', role: 'admin' }]));
    }

    // แก้ไขระบบปิดกระดิ่ง
    document.addEventListener('click', (e) => {
      const panel = document.getElementById('notification-panel');
      const bell = document.getElementById('bell-btn');
      if (panel && !panel.classList.contains('hidden')) {
        if (!panel.contains(e.target) && !bell.contains(e.target)) panel.classList.add('hidden');
      }
    });

    window.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      if (localStorage.getItem('ink_logged_in') === 'true') {
        renderFromCache();
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('main-view').classList.remove('hidden');
        if (localStorage.getItem('ink_user_role') === 'admin') document.getElementById('nav-users').classList.remove('hidden');
        init(); loadNotificationHistory();
      }
    });

    function renderFromCache() {
      const cached = localStorage.getItem('ink_inventory_cache');
      if (cached) { inventory = JSON.parse(cached); renderCards(currentMachine==='all'?null:currentMachine); renderMachines(); }
    }

    function handleLogin() {
      const u = document.getElementById('login-user').value.trim();
      const p = document.getElementById('login-pass').value.trim();
      const users = JSON.parse(localStorage.getItem('ink_user_database'));
      const found = users.find(x => x.user === u && x.pass === p);
      if (found) {
        localStorage.setItem('ink_logged_in', 'true');
        localStorage.setItem('ink_user_role', found.role || 'user');
        renderFromCache();
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('main-view').classList.remove('hidden');
        if (found.role === 'admin') document.getElementById('nav-users').classList.remove('hidden');
        init(); loadNotificationHistory();
      } else {
        document.getElementById('login-error-text').innerText = "ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง";
        document.getElementById('login-error').classList.remove('hidden');
      }
    }

    function handleLogout() { localStorage.removeItem('ink_logged_in'); location.reload(); }

    async function init() {
      try {
        const resp = await fetch(`${API_URL}?action=get&t=${Date.now()}`);
        inventory = await resp.json();
        localStorage.setItem('ink_inventory_cache', JSON.stringify(inventory));
        renderCards(currentMachine==='all'?null:currentMachine);
        renderMachines();
        document.getElementById('status-dot').className = "w-3 h-3 rounded-full bg-green-500";
        lucide.createIcons();
      } catch (e) { document.getElementById('status-dot').className = "w-3 h-3 rounded-full bg-red-500"; }
    }

    function renderCards(machine = null) {
      const grid = document.getElementById('inventory-view');
      const data = machine ? inventory.filter(i => i.machine === machine) : inventory;
      const isAdmin = localStorage.getItem('ink_user_role') === 'admin';
      grid.innerHTML = data.map(item => `
        <div class="card bg-white p-5 rounded-[2.5rem] shadow-sm border border-slate-100 relative flex flex-col justify-between min-h-[240px]">
          ${item.qty <= 5 ? '<div class="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[9px] font-bold px-2.5 py-1 rounded-full animate-bounce shadow-md z-10">🚨 LOW STOCK</div>' : ''}
          <div class="w-full">
            <div class="flex justify-between items-start gap-2 mb-4">
              <div class="flex items-center gap-2"><div class="w-9 h-9 rounded-xl shadow-inner shrink-0" style="background-color:${item.hex}"></div>
              ${isAdmin ? `<button onclick="openAdminStockModal('${item.id}', ${item.qty}, '${item.hex}')" class="p-1.5 bg-slate-50 hover:bg-blue-50 text-slate-400 rounded-xl transition-all"><i data-lucide="edit-3" class="w-3.5 h-3.5"></i></button>` : ''}</div>
              <span class="text-sm font-bold px-2.5 py-1 bg-slate-100 text-slate-500 rounded-lg uppercase truncate">${item.machine}</span>
            </div>
            <h3 class="font-extrabold text-slate-800 text-lg leading-tight mb-1 truncate">${item.type}</h3><p class="text-[11px] text-slate-400 break-all mb-4">${item.id}</p>
          </div>
          <div class="w-full">
            <div class="flex justify-between mb-2 text-xs font-semibold"><span>คงเหลือ</span><span>${item.qty}</span></div>
            <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden mb-5"><div class="h-full rounded-full transition-all duration-1000" style="width:${Math.min((item.qty/25)*100, 100)}%; background-color:${item.hex}"></div></div>
            <div class="grid grid-cols-2 gap-2.5"><button onclick="openModal('${item.id}', 'IN', '${item.hex}', ${item.qty})" class="py-2.5 bg-green-600 text-white rounded-xl text-xs font-bold">รับเข้า</button><button onclick="openModal('${item.id}', 'OUT', '${item.hex}', ${item.qty})" class="py-2.5 bg-[#0a2384] text-white rounded-xl text-xs font-bold">เบิกออก</button></div>
          </div>
        </div>`).join('');
      lucide.createIcons();
    }

    function openModal(id, type, hex, currentQty) {
      currentModalTask = { id, type, currentQty }; document.getElementById('modal').classList.add('modal-show');
      document.getElementById('modal-title').innerText = type === 'IN' ? 'รับเข้าสินค้า' : 'ดำเนินการเบิกออก';
      document.getElementById('modal-sub').innerText = id; document.getElementById('modal-color').style.backgroundColor = hex;
      document.getElementById('modal-qty').value = '';
      const rCont = document.getElementById('modal-remark-container');
      if (type === 'OUT') { rCont.classList.remove('hidden'); document.getElementById('modal-remark').value = ''; } else { rCont.classList.add('hidden'); }
      document.getElementById('modal-qty').focus();
    }

    document.getElementById('modal-submit').onclick = async () => {
      const val = parseFloat(document.getElementById('modal-qty').value);
      const remark = document.getElementById('modal-remark').value;
      if (val > 0) {
        const { id, type, currentQty } = currentModalTask;
        if (type === 'OUT' && val > currentQty) { showToast(`สินค้ามีไม่พอ! เหลือเพียง ${currentQty} ชิ้น`, 'error'); return; }
        closeModal(); document.getElementById('status-dot').className = "w-3 h-3 rounded-full bg-orange-500 animate-spin";
        const newQty = (type === 'IN') ? currentQty + val : currentQty - val;
        const idx = inventory.findIndex(i => i.id === id);
        if (idx !== -1) { inventory[idx].qty = newQty; renderCards(currentMachine==='all'?null:currentMachine); localStorage.setItem('ink_inventory_cache', JSON.stringify(inventory)); }
        showToast(`บันทึกสำเร็จ ยอดใหม่คือ ${newQty}`, 'success');
        try {
          let url = `${API_URL}?action=update&id=${encodeURIComponent(id)}&amt=${val}&type=${type}`;
          if (type === 'OUT') url += `&remark=${encodeURIComponent(remark)}`;
          fetch(url).then(() => { document.getElementById('status-dot').className = "w-3 h-3 rounded-full bg-green-500"; init(); loadNotificationHistory(); });
        } catch (e) {}
      }
    };

    function openAdminUserActionModal(index = null) {
      const users = JSON.parse(localStorage.getItem('ink_user_database'));
      currentAdminUserTask = index; 
      const m = document.getElementById('admin-action-modal'); m.classList.add('modal-show');
      m.querySelector('.scale-95').classList.remove('scale-95');
      const icon = document.getElementById('admin-action-icon');
      if (index !== null) {
        document.getElementById('admin-action-title').innerText = "แก้ไขผู้ใช้งาน";
        document.getElementById('admin-action-user').value = users[index].user;
        document.getElementById('admin-action-pass').value = users[index].pass;
        icon.className = "w-14 h-14 rounded-2xl mx-auto mb-4 flex items-center justify-center bg-blue-600 text-white shadow-inner";
        icon.innerHTML = `<i data-lucide="edit"></i>`;
      } else {
        document.getElementById('admin-action-title').innerText = "เพิ่มผู้ใช้งานใหม่";
        document.getElementById('admin-action-user').value = "";
        document.getElementById('admin-action-pass').value = "";
        icon.className = "w-14 h-14 rounded-2xl mx-auto mb-4 flex items-center justify-center bg-green-600 text-white shadow-inner";
        icon.innerHTML = `<i data-lucide="user-plus"></i>`;
      }
      lucide.createIcons();
    }

    document.getElementById('admin-action-submit').onclick = () => {
      const user = document.getElementById('admin-action-user').value.trim();
      const pass = document.getElementById('admin-action-pass').value.trim();
      if (!user || !pass || pass.length < 8) { showToast("ข้อมูลไม่ถูกต้อง หรือรหัสผ่านสั้นเกินไป", "error"); return; }
      let users = JSON.parse(localStorage.getItem('ink_user_database'));
      if (currentAdminUserTask !== null) { users[currentAdminUserTask] = { user, pass, role: 'user' }; } 
      else { if(users.some(x=>x.user===user)){ showToast("มีชื่อนี้แล้ว","error"); return; } users.push({ user, pass, role: 'user' }); }
      localStorage.setItem('ink_user_database', JSON.stringify(users));
      document.getElementById('admin-action-modal').classList.remove('modal-show'); loadUserManagement();
    };

    function loadUserManagement() {
      const users = JSON.parse(localStorage.getItem('ink_user_database'));
      document.getElementById('user-management-grid').innerHTML = users.map((u, i) => `
        <div class="bg-slate-50 p-5 rounded-3xl border border-slate-200 flex flex-col justify-between">
          <h4 class="font-bold text-slate-800 truncate mb-1"><i data-lucide="user" class="w-4 h-4 inline mr-2"></i>${u.user}</h4>
          <span class="text-[9px] font-bold text-slate-400 uppercase">${u.role}</span>
          <div class="flex items-center justify-end gap-2 border-t pt-3 mt-5">
            <button onclick="openAdminUserActionModal(${i})" class="px-3 py-1.5 bg-blue-50 text-blue-600 rounded-xl text-xs font-bold">แก้ไข</button>
            ${u.user !== 'admin' ? `<button onclick="deleteUserAccount(${i})" class="px-3 py-1.5 bg-red-50 text-red-600 rounded-xl text-xs font-bold">ลบ</button>` : ''}
          </div>
        </div>`).join('');
      lucide.createIcons();
    }

    function deleteUserAccount(i) {
      let users = JSON.parse(localStorage.getItem('ink_user_database'));
      if (confirm(`ลบบัญชี ${users[i].user}?`)) { users.splice(i, 1); localStorage.setItem('ink_user_database', JSON.stringify(users)); loadUserManagement(); }
    }

    function showToast(m, t) {
      const c = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `${t==='success'?'bg-slate-800':'bg-red-600'} text-white px-8 py-4 rounded-2xl shadow-2xl flex items-center gap-3 transform translate-y-10 opacity-0 transition-all duration-500 w-full`;
      toast.innerHTML = `<i data-lucide="${t==='success'?'check':'alert-triangle'}" class="w-5 h-5 shrink-0"></i><span class="text-[18px] font-semibold tracking-wide uppercase">${m}</span>`;
      c.appendChild(toast); lucide.createIcons();
      setTimeout(() => toast.classList.remove('translate-y-10','opacity-0'), 10);
      setTimeout(() => { toast.classList.add('translate-y-10','opacity-0'); setTimeout(() => toast.remove(), 500); }, 2000);
    }

    function toggleNotification() { const p = document.getElementById('notification-panel'); p.classList.toggle('hidden'); if(!p.classList.contains('hidden')){ loadNotificationHistory(); document.getElementById('bell-badge').classList.add('hidden'); } }
    async function loadNotificationHistory() { try { const resp = await fetch(`${API_URL}?action=getLogs&t=${Date.now()}`); const logs = await resp.json(); const list = document.getElementById('notification-list'); if (logs.length <= 1) { list.innerHTML = '<p class="text-center py-2 text-slate-400">ไม่มีประวัติ</p>'; return; } const recent = logs.slice(1).reverse().slice(0, 5); document.getElementById('bell-badge').classList.remove('hidden'); list.innerHTML = recent.map(l => `<div class="border-b pb-2"><div class="flex justify-between font-medium"><span>${l[2]==='IN'?'🟢':'🔵'} ${l[3]} ชิ้น</span><span class="text-slate-400 text-[10px]">${new Date(l[0]).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})}</span></div><div class="text-[10px] text-slate-400 truncate">${l[1]}</div></div>`).join(''); } catch(e){} }
    function openGoogleAuthModal() { document.getElementById('google-auth-modal').classList.add('modal-show'); }
    function closeGoogleAuthModal() { document.getElementById('google-auth-modal').classList.remove('modal-show'); }
    function selectGoogleAccount(email, user) { let users = JSON.parse(localStorage.getItem('ink_user_database')); if (!users.some(x => x.user === user)) { users.push({ user, pass: 'google_auth', role: 'admin' }); localStorage.setItem('ink_user_database', JSON.stringify(users)); } localStorage.setItem('ink_logged_in', 'true'); localStorage.setItem('ink_user_role', 'admin'); location.reload(); }
    function closeModal() { document.getElementById('modal').classList.remove('modal-show'); }
    function changeView(v, p=null) { document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('sidebar-active')); document.getElementById('inventory-view').classList.add('hidden'); document.getElementById('summary-view').classList.add('hidden'); document.getElementById('users-view').classList.add('hidden'); if (v==='all') { currentMachine='all'; document.getElementById('inventory-view').classList.remove('hidden'); document.getElementById('nav-all').classList.add('sidebar-active'); renderCards(); document.getElementById('page-title').innerText="All Items"; } else if (v==='summary') { document.getElementById('summary-view').classList.remove('hidden'); document.getElementById('nav-summary').classList.add('sidebar-active'); loadChart(); document.getElementById('page-title').innerText="Summary"; } else if (v==='users') { document.getElementById('users-view').classList.remove('hidden'); document.getElementById('nav-users').classList.add('sidebar-active'); loadUserManagement(); document.getElementById('page-title').innerText="Users Management"; } else { currentMachine=p; document.getElementById('inventory-view').classList.remove('hidden'); document.getElementById(`nav-${p.replace(/\s/g,'')}`).classList.add('sidebar-active'); renderCards(p); document.getElementById('page-title').innerText=p; } }
    function renderMachines() { const list = [...new Set(inventory.map(i => i.machine))]; document.getElementById('machine-menu').innerHTML = list.map(m => `<button onclick="changeView('machine', '${m}')" id="nav-${m.replace(/\s/g, '')}" class="nav-btn w-full flex items-center gap-3 p-3 pl-6 rounded-xl hover:bg-white/5 transition opacity-75 text-xs text-left"><i data-lucide="${m.toLowerCase().includes('cylinder')?'layers':'monitor'}" class="w-4 h-4 text-blue-300"></i><span class="truncate">${m}</span></button>`).join(''); lucide.createIcons(); }
    function filter() { const q = document.getElementById('search').value.toLowerCase(); document.querySelectorAll('.card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(q) ? '' : 'none'); }
    async function loadChart() { const resp = await fetch(`${API_URL}?action=getLogs&t=${Date.now()}`); const logs = await resp.json(); const cType = 'line'; const grouped = {}; let labels = []; for (let i = 6; i >= 0; i--) { const d = new Date(); d.setDate(d.getDate()-i); const k = d.toLocaleDateString(); labels.push(k); grouped[k] = {IN:0, OUT:0}; } logs.slice(1).forEach(l => { const d = new Date(l[0]); let k = d.toLocaleDateString(); if (grouped[k]) grouped[k][l[2]] += l[3]; }); if (chartInstance) chartInstance.destroy(); chartInstance = new Chart(document.getElementById('mainChart'), { type: cType, data: { labels, datasets: [{ label:'รับเข้า', data:labels.map(l=>grouped[l].IN), borderColor:'#22c55e', fill:true }, { label:'เบิกออก', data:labels.map(l=>grouped[l].OUT), borderColor:'#102a96', fill:true }] }, options: { responsive:true, maintainAspectRatio:false }}); }
    function openAdminStockModal(id, qty, hex) { currentAdminStockTask={id,qty}; document.getElementById('admin-stock-modal').classList.add('modal-show'); document.getElementById('admin-stock-sub').innerText=id; document.getElementById('admin-stock-color').style.backgroundColor=hex; document.getElementById('admin-stock-qty').value=qty; }
    function closeAdminStockModal() { document.getElementById('admin-stock-modal').classList.remove('modal-show'); }
    document.getElementById('admin-stock-submit').onclick = async () => { const tQty = parseFloat(document.getElementById('admin-stock-qty').value); if(isNaN(tQty)||tQty<0) return; const {id,qty} = currentAdminStockTask; if(tQty===qty){ closeAdminStockModal(); return; } closeAdminStockModal(); document.getElementById('status-dot').className="w-3 h-3 rounded-full bg-orange-500 animate-spin"; const diff = Math.abs(tQty-qty), type = tQty>qty?'IN':'OUT'; const idx = inventory.findIndex(i=>i.id===id); if(idx!==-1){ inventory[idx].qty=tQty; renderCards(currentMachine==='all'?null:currentMachine); localStorage.setItem('ink_inventory_cache', JSON.stringify(inventory)); } showToast(`ปรับปรุงยอดสำเร็จ ยอดใหม่คือ ${tQty}`, 'success'); try { fetch(`${API_URL}?action=update&id=${encodeURIComponent(id)}&amt=${diff}&type=${type}&remark=AdminEdit`).then(()=>{ document.getElementById('status-dot').className="w-3 h-3 rounded-full bg-green-500"; init(); loadNotificationHistory(); }); } catch(e){} };
  </script>
</body>
</html>
