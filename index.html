<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Smart Ink Pro - Tanapong</title>

  <style>
    body { font-family: 'Kanit', sans-serif; }

<body class="bg-[#f1f5f9] min-h-screen text-slate-800 flex flex-col md:flex-row overflow-x-hidden">

  <div id="login-view" class="fixed inset-0 bg-[#001b6e] flex flex-col items-center justify-center p-4 z-50 transition-opacity duration-500 overflow-y-auto">
    <div class="mb-6 text-center text-white">
      <div class="bg-white p-4 rounded-3xl shadow-xl mb-4 inline-block"><i data-lucide="printer" class="w-12 h-12 text-[#001b6e]"></i></div>
      <h1 class="text-3xl font-bold tracking-tight">INK STOCK SYSTEM</h1>
      <p class="text-sm opacity-70 mt-1">ระบบจัดการและควบคุมสต็อกสีโรงพิมพ์</p>
    </div>

    <div class="bg-white w-full max-w-sm rounded-[2.5rem] shadow-[0_25px_60px_-15px_rgba(0,0,0,0.3)] p-8 relative border border-slate-100">
      <div id="login-error" class="hidden mb-4 p-3 bg-red-50 text-red-600 rounded-2xl text-xs font-medium flex items-center gap-2">
        <i data-lucide="alert-circle" class="w-4 h-4"></i>
        <span id="login-error-text">ข้อผิดพลาด</span>

      <div id="form-login">

        <div class="mb-4">
          <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">ชื่อผู้ใช้งาน</label>
          <input type="text" id="login-user" placeholder="ชื่อผู้ใช้" class="w-full px-5 py-3.5 rounded-2xl bg-slate-50 border-2 border-slate-100 outline-none focus:border-blue-500 text-sm font-medium transition-all">
        </div>
        <div class="mb-6">
          <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">รหัสผ่าน</label>
          <input type="password" id="login-pass" placeholder="••••••••" class="w-full px-5 py-3.5 rounded-2xl bg-slate-50 border-2 border-slate-100 outline-none focus:border-blue-500 text-sm font-medium transition-all">
        </div>
        <button onclick="handleLogin()" class="w-full bg-[#102a96] text-white py-4 rounded-2xl font-bold hover:bg-blue-800 shadow-lg shadow-blue-200 transition mb-5">เข้าสู่ระบบ</button>

      </div>

      <div id="form-register" class="hidden">

        <button onclick="openGoogleAuthModal()" class="w-full flex items-center justify-center gap-3 bg-white border-2 border-slate-200 text-slate-700 py-3 rounded-2xl font-bold hover:bg-slate-50 hover:border-slate-300 transition-all mb-5 text-xs shadow-sm">
          <svg class="w-4 h-4" viewBox="0 0 24 24">
            <path fill="#EA4335" d="M12 5.04c1.66 0 3.2.57 4.38 1.69l3.27-3.27C17.68 1.54 15.01 1 12 1 7.35 1 3.37 3.67 1.39 7.56l3.89 3.02c.92-2.75 3.49-4.54 6.72-4.54z"/>
            <path fill="#4285F4" d="M23.49 12.27c0-.81-.07-1.59-.2-2.36H12v4.51h6.46c-.29 1.48-1.14 2.73-2.4 3.58l3.73 2.89c2.18-2.01 3.7-4.99 3.7-8.62z"/>
            <path fill="#FBBC05" d="M5.28 14.42c-.24-.73-.38-1.51-.38-2.32s.14-1.59.38-2.32L1.39 6.76C.5 8.54 0 10.52 0 12.6s.5 4.06 1.39 5.84l3.89-3.02z"/>
            <path fill="#34A853" d="M12 23c3.24 0 5.97-1.07 7.96-2.91l-3.73-2.89c-1.03.69-2.35 1.11-4.23 1.11-3.23 0-5.8-1.79-6.72-4.54L1.39 16.8C3.37 20.69 7.35 23 12 23z"/>
          </svg>
          ลงทะเบียนการใช้งานด้วย Google

        <div class="flex items-center my-4">

        </div>
        <div class="mb-4">

        <p class="text-center text-xs text-slate-400">มีบัญชีอยู่แล้ว? <button onclick="toggleAuthForm(false)" class="text-blue-600 font-bold hover:underline outline-none">กลับไปเข้าสู่ระบบ</button></p>

    </aside>

    <div class="flex-1 flex flex-col min-w-0">
      <header class="bg-white p-4 md:p-6 shadow-sm flex justify-between items-center sticky top-0 z-50 gap-4 flex-wrap md:flex-nowrap">
        <h2 id="page-title" class="text-lg md:text-xl font-bold uppercase truncate max-w-full">All Items</h2>

          <div class="relative inline-block">

            <div class="flex flex-wrap justify-between items-center mb-6 gap-4">

                <select id="chart-filter" onchange="loadChart()" class="bg-slate-100 rounded-xl px-2 py-2 font-bold outline-none"><option value="both">ดูทั้งหมด</option><option value="IN">เฉพาะรับเข้า</option><option value="OUT">เฉพาะเบิกออก</option></select>
              </div>

            <div class="h-[300px] md:h-[400px]"><canvas id="mainChart"></canvas></div>

        </div>

        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5 pl-1">ป้อนรหัสผ่านใหม่ (8 ตัวอักษรขึ้นไป และห้ามภาษาไทย)</label>

  <div id="admin-stock-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center opacity-0 pointer-events-none transition-all z-50 p-4 text-center">
    <div class="bg-white w-full max-w-sm rounded-[3rem] shadow-2xl p-8 md:p-10 scale-95 transition-transform duration-300">
      <div id="admin-stock-color" class="w-14 h-14 rounded-2xl mx-auto mb-4 flex items-center justify-center text-white text-xl font-bold shadow-inner border border-slate-100"></div>
      <h3 class="text-xl md:text-2xl font-bold mb-1 text-slate-800">แก้ไขสต็อกคงเหลือ</h3>
      <p id="admin-stock-sub" class="text-[10px] text-slate-400 mb-6 uppercase tracking-widest break-all px-2"></p>
      
      <div class="mb-6">
        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider text-left mb-1.5 pl-1">จำนวนคงเหลือใหม่</label>
        <input type="number" id="admin-stock-qty" placeholder="0" class="w-full text-center text-3xl font-bold p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 outline-none focus:border-blue-500 transition-all">

      <div class="flex gap-4">
        <button onclick="closeAdminStockModal()" class="flex-1 py-3.5 bg-slate-100 text-slate-500 font-bold rounded-xl text-sm hover:bg-slate-200 transition">ยกเลิก</button>
        <button id="admin-stock-submit" class="flex-1 py-3.5 bg-[#0a2384] text-white font-bold rounded-xl text-sm hover:bg-blue-900 shadow-xl shadow-blue-100">บันทึกยอด</button>
      </div>
    </div>

  <script>
    // ⚠️ นำ Google Client ID จาก Google Cloud Console มากรอกตรงนี้เพื่อให้ระบบแสดงกล่องแบบภาพสากล
    const GOOGLE_CLIENT_ID = "https://script.google.com/macros/s/AKfycbzgBnotHKR7t66SqBKMgHCU_LPnOGFeducadyTZqydFlLmMX2Jb7TXHx3yidibhjn_M/exec"; 
    
    let inventory = [];
    let currentMachine = 'all', currentModalTask = null, currentAdminTask = null, currentAdminStockTask = null, chartInstance = null;

    if (!localStorage.getItem('ink_user_database')) {
      localStorage.setItem('ink_user_database', JSON.stringify([
        { user: 'admin', pass: 'admin', email: 'admin@ink.com', role: 'admin' }
      ]));
    }

    // ฟังก์ชันซ่อมระบบพับกระดิ่ง: คลิกนอกแจ้งเตือนให้ยุบตัวลงทันทีอย่างเสถียร
    document.addEventListener('click', (e) => {
      const panel = document.getElementById('notification-panel');
      const bellBtn = document.getElementById('bell-btn');
      if (panel && !panel.classList.contains('hidden')) {
        if (!panel.contains(e.target) && !bellBtn.contains(e.target)) {
          panel.classList.add('hidden');
        }
      }
    });

    window.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      if (localStorage.getItem('ink_logged_in') === 'true') {
        loadCachedLayout();
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('main-view').classList.remove('hidden');
        if (localStorage.getItem('ink_user_role') === 'admin') {
          document.getElementById('nav-users').classList.remove('hidden');
        }
        init();
        loadNotificationHistory();
      }
    });

    function loadCachedLayout() {
      const cachedData = localStorage.getItem('ink_inventory_cache');
      if (cachedData) {
        inventory = JSON.parse(cachedData);
        renderCards(currentMachine === 'all' ? null : currentMachine);
        renderMachines();
      }
    }

    // ฟังก์ชันยิงระเบิดหน้าจอขอใช้สิทธิ์เลือกบัญชีของ Google จริงๆ (ภาพลักษณ์ตรงตามภาพ image_857539.png)
    function openGoogleAuthModal() {
      if (GOOGLE_CLIENT_ID.includes("YOUR_GOOGLE_CLIENT_ID")) {
        alert("กรุณากรอก Google Client ID ของคุณในโค้ดสคริปต์บรรทัดที่ 109 ก่อนเปิดใช้งานระบบเชื่อมต่อหน้าจริงของ Google");
        return;
      }
      try {
        const client = google.accounts.oauth2.initTokenClient({
          client_id: GOOGLE_CLIENT_ID,
          scope: 'email profile',
          callback: (response) => {
            if (response.access_token) {
              fetch(`https://www.googleapis.com/oauth2/v3/userinfo?access_token=${response.access_token}`)
                .then(res => res.json())
                .then(data => {
                  selectGoogleAccount(data.email, data.given_name || "GoogleUser");
                });
            }
          }
        });
        client.requestAccessToken();
      } catch (err) {
        showToast("Google Identity Library กำลังโหลด กรุณากดใหม่อีกครั้ง", "error");
      }
    }

    function selectGoogleAccount(email, username) {
      let users = JSON.parse(localStorage.getItem('ink_user_database'));
      if (!users.some(x => x.user === username)) {
        users.push({ user: username, pass: 'google_linked_auth', email: email, role: 'user' });
        localStorage.setItem('ink_user_database', JSON.stringify(users));
      }
      
      localStorage.setItem('ink_logged_in', 'true');

      loadCachedLayout();
      document.getElementById('login-view').classList.add('hidden');
      document.getElementById('main-view').classList.remove('hidden');
      
      showToast("ลงทะเบียนผ่านบัญชี GOOGLE สำเร็จ", "success");

    function handleLogin() {
      const u = document.getElementById('login-user').value.trim();
      const p = document.getElementById('login-pass').value.trim();
      const errDiv = document.getElementById('login-error');
      const errText = document.getElementById('login-error-text');

      if (!u || !p) {
        errText.innerText = "กรุณากรอกชื่อผู้ใช้และรหัสผ่านให้ครบถ้วน";
        errDiv.classList.remove('hidden');
        return;
      }

      const users = JSON.parse(localStorage.getItem('ink_user_database'));
      const found = users.find(x => x.user === u && x.pass === p);

      if (found) {
        localStorage.setItem('ink_logged_in', 'true');
        localStorage.setItem('ink_user_role', found.role || 'user');
        errDiv.classList.add('hidden');
        
        loadCachedLayout();
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('main-view').classList.remove('hidden');
        if (found.role === 'admin') document.getElementById('nav-users').classList.remove('hidden');
        init();
        loadNotificationHistory();
      } else {
        errText.innerText = "ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง";
        errDiv.classList.remove('hidden');
        lucide.createIcons();
      }
    }

    function handleRegister() {
      const email = document.getElementById('reg-email').value.trim();
      const user = document.getElementById('reg-user').value.trim();
      const pass = document.getElementById('reg-pass').value.trim();
      const errDiv = document.getElementById('login-error');
      const errText = document.getElementById('login-error-text');

      if (!email || !user || !pass) {
        errText.innerText = "กรุณากรอกข้อมูลสำหรับการลงทะเบียนให้ครบถ้วน";
        errDiv.classList.remove('hidden');
        return;
      }

      const thaiRegex = /[\u0E00-\u0E7F]/;
      if (thaiRegex.test(user) || thaiRegex.test(pass)) {
        errText.innerText = "บัญชีผู้ใช้งานและรหัสผ่านห้ามใช้ภาษาไทย (อังกฤษและตัวเลขเท่านั้น)";
        errDiv.classList.remove('hidden');
        lucide.createIcons();
        return;
      }

      if (pass.length < 8) {
        errText.innerText = "รหัสผ่านความปลอดภัยต้องมีจำนวนอย่างน้อย 8 ตัวอักษรขึ้นไป";
        errDiv.classList.remove('hidden');
        lucide.createIcons();
        return;
      }

      let users = JSON.parse(localStorage.getItem('ink_user_database'));
      if (users.some(x => x.user === user)) {
        errText.innerText = "ชื่อผู้ใช้งานนี้มีอยู่ในระบบแล้ว";
        errDiv.classList.remove('hidden');
        return;
      }

      users.push({ user, pass, email, role: 'user' });
      localStorage.setItem('ink_user_database', JSON.stringify(users));
      
      showToast("ลงทะเบียนบัญชีใหม่สำเร็จแล้ว", "success");
      toggleAuthForm(false);
    }

    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      if (!container) return;
      const toast = document.createElement('div');
      const bgColor = type === 'success' ? 'bg-slate-800' : 'bg-red-600';
      toast.className = `${bgColor} text-white px-8 py-4 rounded-2xl shadow-2xl flex items-center gap-3 transform translate-y-10 opacity-0 transition-all duration-500 w-full`;
      toast.innerHTML = `<i data-lucide="${type==='success'?'check':'alert-triangle'}" class="w-5 h-5 shrink-0"></i><span class="text-[18px] font-semibold tracking-wide uppercase break-words">${message}</span>`;
      container.appendChild(toast);
      lucide.createIcons();
      setTimeout(() => toast.classList.remove('translate-y-10', 'opacity-0'), 10);
      setTimeout(() => {
        toast.classList.add('translate-y-10', 'opacity-0');
        setTimeout(() => toast.remove(), 500);
      }, 2000);
    }

    document.getElementById('modal-submit').onclick = async () => {
      const val = parseFloat(document.getElementById('modal-qty').value);
      const remark = document.getElementById('modal-remark').value;
      
      if (val > 0) {
        const { id, type, currentQty } = currentModalTask;

        if (type === 'OUT' && val > currentQty) {
          showToast(`สินค้ามีไม่พอ! ปัจจุบันเหลือเพียง ${currentQty} ชิ้น`, 'error');
          return;
        }

        closeModal();
        document.getElementById('status-dot').className = "w-3 h-3 rounded-full bg-orange-500 animate-spin";
        const newQty = (type === 'IN') ? currentQty + val : currentQty - val;
        
        const idx = inventory.findIndex(i => i.id === id);
        if (idx !== -1) {
          inventory[idx].qty = newQty;
          renderCards(currentMachine === 'all' ? null : currentMachine);
          localStorage.setItem('ink_inventory_cache', JSON.stringify(inventory));
        }

        showToast(`SUCCESS: บันทึกสำเร็จ ยอดใหม่คือ ${newQty}`, 'success');

        try {
          let url = `${API_URL}?action=update&id=${encodeURIComponent(id)}&amt=${val}&type=${type}`;
          if (type === 'OUT') url += `&remark=${encodeURIComponent(remark)}`;
          
          fetch(url).then(async (resp) => {
            document.getElementById('status-dot').className = "w-3 h-3 rounded-full bg-green-500";
            init(); 
            loadNotificationHistory(); 
          });
        } catch (err) { showToast("ไม่สามารถซิงค์ข้อมูลลงแผ่นงานได้", "error"); }
      }
    };

    document.getElementById('admin-stock-submit').onclick = async () => {
      const targetQty = parseFloat(document.getElementById('admin-stock-qty').value);
      if (isNaN(targetQty) || targetQty < 0) {
        showToast("กรุณากรอกจำนวนที่ถูกต้อง", "error");

      document.getElementById('status-dot').className = "w-3 h-3 rounded-full bg-orange-500 animate-spin";

        localStorage.setItem('ink_inventory_cache', JSON.stringify(inventory));

    async function loadChart() {
      const resp = await fetch(`${API_URL}?action=getLogs&t=${Date.now()}`);
      const logs = await resp.json();
      const timeframe = document.getElementById('timeframe').value, filter = document.getElementById('chart-filter').value;
      const chartType = document.getElementById('chart-type').value; 
      const grouped = {};
      let labels = [];
      
      if (timeframe === 'day') {
        for (let i = 6; i >= 0; i--) {
          const d = new Date(); d.setDate(d.getDate() - i);
          const key = d.toLocaleDateString(); labels.push(key);
          grouped[key] = { IN: 0, OUT: 0 };
        }
      }
      logs.slice(1).forEach(l => {
        const d = new Date(l[0]); let key = d.toLocaleDateString();
        if (timeframe === 'month') key = `${d.getMonth()+1}/${d.getFullYear()}`;
        if (timeframe === 'year') key = d.getFullYear();
        if (timeframe !== 'day' && !grouped[key]) grouped[key] = { IN: 0, OUT: 0 };
        if (grouped[key]) { grouped[key][l[2]] += l[3]; }
      });
      if (timeframe !== 'day') labels = Object.keys(grouped).slice(-10);
      const ds = [];
      if (filter !== 'OUT') ds.push({ label: 'รับเข้า', data: labels.map(l=>grouped[l].IN), borderColor: '#22c55e', backgroundColor: chartType === 'bar' ? '#22c55e' : 'rgba(34,197,94,0.1)', fill: true, tension: 0.4 });
      if (filter !== 'IN') ds.push({ label: 'เบิกออก', data: labels.map(l=>grouped[l].OUT), borderColor: '#102a96', backgroundColor: chartType === 'bar' ? '#102a96' : 'rgba(16,42,150,0.1)', fill: true, tension: 0.4 });
      if (chartInstance) chartInstance.destroy();
      chartInstance = new Chart(document.getElementById('mainChart'), { type: chartType, data: { labels, datasets: ds }, options: { responsive: true, maintainAspectRatio: false }});
    }

    async function exportExcel() {
      const resp = await fetch(`${API_URL}?action=getLogs`);
      const logs = await resp.json();
      let csv = "\ufeffวันที่,รหัสสินค้า,ประเภท,จำนวน,ผู้บันทึก,หมายเหตุ\n";
      logs.slice(1).forEach(r => csv += r.join(",") + "\n");
      const link = document.createElement("a");
      link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
      link.download = `ink_report_${Date.now()}.csv`; link.click();
    }

    function renderMachines() {
      const list = [...new Set(inventory.map(i => i.machine))];
      document.getElementById('machine-menu').innerHTML = list.map(m => {
        const isCylinder = m.toLowerCase().includes('cylinder');
        return `
        <button onclick="changeView('machine', '${m}')" id="nav-${m.replace(/\s/g, '')}" class="nav-btn w-full flex items-center gap-3 p-3 pl-6 rounded-xl hover:bg-white/5 transition opacity-75 text-xs text-left">
          <i data-lucide="${isCylinder ? 'layers' : 'monitor'}" class="w-4 h-4 text-blue-300"></i>
          <span class="truncate">${m}</span>
        </button>`;
      }).join('');
      lucide.createIcons();
    }
    
    function closeModal() { document.getElementById('modal').classList.remove('modal-show'); }
    function filter() {
      const q = document.getElementById('search').value.toLowerCase();
      document.querySelectorAll('.card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(q) ? '' : 'none');
    }
  </script>
</body>
</html>
